<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsyMind BPM</title>

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: #f8fafc;
      text-align: center;
      overflow-x: hidden;
      background: radial-gradient(circle at top, #071426, #020617 55%, #000814);
      letter-spacing: 0.3px;
      animation: bodyFade 1.2s ease;
    }

    @keyframes bodyFade {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.04;
      mix-blend-mode: soft-light;
      pointer-events: none;
      z-index: 999;
    }

    #cursorGlow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(56, 189, 248, 0.18),
        transparent 70%
      );
      pointer-events: none;
      z-index: -1;
      transform: translate(-50%, -50%);
      transition: transform 0.12s linear, opacity 0.3s ease;
      filter: blur(30px);
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: #020617;
    }

    #aurora {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.18), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(14, 165, 233, 0.14), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(125, 211, 252, 0.12), transparent 45%);
      filter: blur(90px);
      animation: auroraMove 18s ease-in-out infinite alternate;
    }

    @keyframes auroraMove {
      0% {
        transform: scale(1) rotate(0deg) translateY(0px);
      }
      50% {
        transform: scale(1.08) rotate(6deg) translateY(-15px);
      }
      100% {
        transform: scale(1.03) rotate(-6deg) translateY(10px);
      }
    }

    .container {
      position: relative;
      margin: 80px auto;
      padding: 40px;
      max-width: 760px;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.1),
        rgba(255, 255, 255, 0.04)
      );
      border-radius: 30px;
      backdrop-filter: blur(35px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 25px 100px rgba(56, 189, 248, 0.18),
        0 0 140px rgba(14, 165, 233, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
      overflow: hidden;
      animation:
        float 8s ease-in-out infinite,
        pageEnter 1.8s cubic-bezier(0.16, 1, 0.3, 1);
      transform-style: preserve-3d;
      perspective: 1200px;
      transition: transform 0.15s linear, box-shadow 0.3s ease;
    }

    .container::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 30px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.22),
        rgba(56, 189, 248, 0.25),
        transparent,
        rgba(125, 211, 252, 0.18)
      );

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

      -webkit-mask-composite: xor;
      pointer-events: none;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: scale(1.03) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0);
      }
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
    }

    h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #7dd3fc, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(56, 189, 248, 0.35);
      margin: 0;
    }

    .hero-sub {
      margin-top: 10px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .dropzone {
      margin-top: 30px;
      border: 2px dashed rgba(56, 189, 248, 0.7);
      padding: 40px;
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .dropzone:hover {
      border-color: #7dd3fc;
      background: rgba(56, 189, 248, 0.1);
      box-shadow:
        inset 0 0 35px rgba(56, 189, 248, 0.18),
        0 0 50px rgba(56, 189, 248, 0.18);
      transform: translateY(-2px) scale(1.01);
    }

    .glass-player {
      margin-top: 20px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      display: none;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
      transition: 0.4s ease;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
    }

    .glass-player.active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .glass-player.playing {
      box-shadow:
        0 0 40px rgba(56, 189, 248, 0.35),
        0 0 120px rgba(14, 165, 233, 0.25),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .player-glow {
      position: absolute;
      inset: -30%;
      background: radial-gradient(
        circle at center,
        rgba(56, 189, 248, 0.25),
        transparent 60%
      );
      filter: blur(80px);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 0;
    }

    .glass-player.playing .player-glow {
      opacity: 1;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        opacity: 0.45;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.9;
      }

      100% {
        transform: scale(1);
        opacity: 0.45;
      }
    }

    .glass-player::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        45deg,
        transparent 20%,
        rgba(255, 255, 255, 0.04) 25%,
        transparent 30%
      );

      background-size: 40px 40px;
      animation: movePattern 8s linear infinite;
      pointer-events: none;
    }

    @keyframes movePattern {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 120px 120px;
      }
    }

    #playBtn {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      cursor: pointer;
      z-index: 2;
      transition: 0.4s;
    }

    #playBtn:hover {
      transform: scale(1.12);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.8);
    }

    #stopBtn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      z-index: 2;
      transition: 0.4s;
    }

    #stopBtn:hover {
      transform: rotate(90deg) scale(1.1);
      background: rgba(255, 255, 255, 0.2);
    }

    canvas {
      width: 160px;
      height: 50px;
      border-radius: 14px;
      display: block;
      z-index: 2;
      background: radial-gradient(circle at center, #020617, #000);
      box-shadow:
        inset 0 0 25px rgba(0, 0, 0, 0.9),
        0 0 25px rgba(56, 189, 248, 0.12);
    }

    .progress-audio {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.7);
    }

    .volume-box {
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }

    .volume-box i {
      color: #7dd3fc;
      font-size: 18px;
    }

    #volumeSlider {
      appearance: none;
      width: 110px;
      height: 6px;
      border-radius: 20px;
      background: linear-gradient(
        90deg,
        rgba(56, 189, 248, 0.8),
        rgba(14, 165, 233, 0.3)
      );
      outline: none;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.35);
    }

    #volumeSlider::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.8);
      cursor: pointer;
    }

    .cards {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      padding: 22px;
      border-radius: 18px;
      transition: 0.35s;
      min-width: 180px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.08);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow:
        0 15px 40px rgba(56, 189, 248, 0.25),
        0 0 80px rgba(14, 165, 233, 0.15);
    }

    .loader {
      margin-top: 30px;
      display: none;
    }

    .bar {
      width: 6px;
      height: 40px;
      background: #38bdf8;
      margin: 0 3px;
      display: inline-block;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,
      100% {
        transform: scaleY(0.3);
      }

      50% {
        transform: scaleY(1);
      }
    }

    .loader-text {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 2px;
      color: #7dd3fc;
    }

    .tg-btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
      text-decoration: none;
      transition: 0.4s;
    }

    .tg-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(14, 165, 233, 0.45);
    }

    footer {
      margin-top: 40px;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#38bdf8, #0ea5e9);
      border-radius: 20px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }
  </style>
</head>

<body>
  <div id="cursorGlow"></div>
  <div id="aurora"></div>

  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <div class="header">
      <img src="/static/avatar.png" class="logo" />

      <h1>
        <i class="ri-headphone-fill"></i>
        OpsyMind BPM
      </h1>
    </div>

    <p class="hero-sub">
      Твой лучший помощник в музыке по имени Opsy!
    </p>

    <div class="dropzone" id="dropzone">
      📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden />

    <div class="glass-player" id="player">
      <div class="player-glow"></div>

      <button id="playBtn">
        <i class="ri-play-fill"></i>
      </button>

      <canvas id="visualizer"></canvas>

      <div class="progress-audio" id="progressAudio">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <span id="time">0:00</span>

      <div class="volume-box">
        <i class="ri-volume-up-line"></i>

        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>

      <button id="stopBtn">
        <i class="ri-close-line"></i>
      </button>

      <audio id="audio"></audio>
    </div>

    <div class="loader" id="loader">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>

      <div class="loader-text">
        Не забывайте переходить в нашего бота...
      </div>
    </div>

    <div class="cards" id="result"></div>

    <a
      href="https://t.me/OpsyMindBot"
      target="_blank"
      class="tg-btn"
    >
      Открыть бота
    </a>
  </div>

  <footer>
    🤖 @OpsyMindBot
  </footer>

  <script>
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");

    const audio = document.getElementById("audio");

    const player = document.getElementById("player");

    const playBtn = document.getElementById("playBtn");
    const stopBtn = document.getElementById("stopBtn");

    const progressFill = document.getElementById("progressFill");
    const progressAudio = document.getElementById("progressAudio");

    const time = document.getElementById("time");

    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    const loader = document.getElementById("loader");

    const volumeSlider = document.getElementById("volumeSlider");

    const glow = document.getElementById("cursorGlow");

    document.addEventListener("mousemove", (e) => {
      glow.style.left = `${e.clientX}px`;
      glow.style.top = `${e.clientY}px`;

      const container = document.querySelector(".container");

      const x = (window.innerWidth / 2 - e.clientX) / 28;
      const y = (window.innerHeight / 2 - e.clientY) / 28;

      container.style.transform = `
        rotateY(${-x}deg)
        rotateX(${y}deg)
        translateY(-4px)
      `;
    });

    dropzone.onclick = () => {
      fileInput.click();
    };

    fileInput.onchange = () => {
      handle(fileInput.files[0]);
    };

    function handle(file) {
      if (!file) return;

      const url = URL.createObjectURL(file);

      audio.src = url;
      audio.load();

      player.style.display = "flex";

      setTimeout(() => {
        player.classList.add("active");
      }, 50);

      visualize();

      upload(file);
    }

    playBtn.onclick = () => {
      if (!audio.src) return;

      if (audio.paused) {
        audio.play();

        player.classList.add("playing");

        playBtn.innerHTML = `
          <i class="ri-pause-fill"></i>
        `;
      } else {
        audio.pause();

        player.classList.remove("playing");

        playBtn.innerHTML = `
          <i class="ri-play-fill"></i>
        `;
      }
    };

    stopBtn.onclick = () => {
      audio.pause();

      audio.currentTime = 0;
      audio.src = "";

      player.classList.remove("playing");

      player.style.display = "none";

      progressFill.style.width = "0%";

      time.innerText = "0:00";

      document.getElementById("result").innerHTML = "";
    };

    volumeSlider.oninput = () => {
      audio.volume = volumeSlider.value;
    };

    audio.ontimeupdate = () => {
      const percent =
        (audio.currentTime / audio.duration) * 100;

      progressFill.style.width = `${percent}%`;

      const min = Math.floor(audio.currentTime / 60);

      let sec = Math.floor(audio.currentTime % 60);

      if (sec < 10) {
        sec = `0${sec}`;
      }

      time.innerText = `${min}:${sec}`;
    };

    progressAudio.onclick = (e) => {
      const width = progressAudio.clientWidth;

      const clickX = e.offsetX;

      audio.currentTime =
        (clickX / width) * audio.duration;
    };

    function upload(file) {
      loader.style.display = "block";

      document.getElementById("result").innerHTML = "";

      const formData = new FormData();

      formData.append("file", file);

      fetch("/analyze", {
        method: "POST",
        body: formData
      })
        .then((res) => res.json())
        .then((data) => {
          loader.style.display = "none";

          document.getElementById("result").innerHTML = `
            <div class="card">
              <h2>${data.bpm}</h2>
              <p>BPM</p>
            </div>

            <div class="card">
              <h2>${data.key}</h2>
              <p>Musical Key</p>
            </div>

            <div class="card">
              <h2>${data.energy}</h2>
              <p>Energy</p>
            </div>
          `;
        });
    }

    function visualize() {
      const audioCtx = new AudioContext();

      const src =
        audioCtx.createMediaElementSource(audio);

      const analyser = audioCtx.createAnalyser();

      src.connect(analyser);

      analyser.connect(audioCtx.destination);

      analyser.fftSize = 256;

      const bufferLength = analyser.frequencyBinCount;

      const dataArray = new Uint8Array(bufferLength);

      canvas.width = 160;
      canvas.height = 50;

      function draw() {
        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(
          0,
          0,
          canvas.width,
          canvas.height
        );

        const barWidth =
          canvas.width / bufferLength;

        for (let i = 0; i < bufferLength; i++) {
          const value = dataArray[i];

          const height =
            canvas.height * (value / 255);

          const offset =
            canvas.height - height;

          const gradient =
            ctx.createLinearGradient(
              0,
              0,
              0,
              canvas.height
            );

          gradient.addColorStop(0, "#7dd3fc");
          gradient.addColorStop(0.5, "#38bdf8");
          gradient.addColorStop(1, "#0ea5e9");

          ctx.fillStyle = gradient;

          ctx.shadowBlur = 18;
          ctx.shadowColor = "#38bdf8";

          ctx.beginPath();

          ctx.roundRect(
            i * barWidth,
            offset,
            barWidth - 2,
            height,
            6
          );

          ctx.fill();
        }
      }

      draw();
    }

    const bgCanvas = document.getElementById("bgCanvas");
    const bgCtx = bgCanvas.getContext("2d");

    function resizeBG() {
      bgCanvas.width = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }

    resizeBG();

    window.addEventListener("resize", resizeBG);

    const bgParticles = [];

    for (let i = 0; i < 120; i++) {
      bgParticles.push({
        x: Math.random() * bgCanvas.width,
        y: Math.random() * bgCanvas.height,
        radius: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.2,
        speedY: (Math.random() - 0.5) * 0.2,
        alpha: Math.random()
      });
    }

    function animateBG() {
      requestAnimationFrame(animateBG);

      bgCtx.clearRect(
        0,
        0,
        bgCanvas.width,
        bgCanvas.height
      );

      bgParticles.forEach((p) => {
        bgCtx.beginPath();

        bgCtx.arc(
          p.x,
          p.y,
          p.radius,
          0,
          Math.PI * 2
        );

        bgCtx.fillStyle = `
          rgba(125, 211, 252, ${p.alpha})
        `;

        bgCtx.fill();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x < 0) p.x = bgCanvas.width;
        if (p.x > bgCanvas.width) p.x = 0;

        if (p.y < 0) p.y = bgCanvas.height;
        if (p.y > bgCanvas.height) p.y = 0;
      });
    }

    animateBG();
  </script>
</body>
</html>
