<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top,#0f172a 0%,#111827 35%,#1e293b 100%);
}

/* =========================
   BACKGROUND
========================= */

#bgCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-5;
}

/* neon rings */

.ring{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    filter:blur(1px);
    opacity:.22;
    animation:rotateRing linear infinite;
}

.ring1{
    width:600px;
    height:600px;
    border:1px solid rgba(125,211,252,.16);
    top:-200px;
    left:-200px;
    animation-duration:40s;
}

.ring2{
    width:900px;
    height:900px;
    border:1px solid rgba(56,189,248,.08);
    bottom:-300px;
    right:-300px;
    animation-duration:65s;
}

@keyframes rotateRing{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* cursor glow */

.cursor-glow{

    position:fixed;

    width:280px;
    height:280px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(
        circle,
        rgba(125,211,252,.16),
        transparent 70%
    );

    transform:
    translate(-50%,-50%);

    z-index:-1;

    filter:blur(20px);
}

/* =========================
   CONTAINER
========================= */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.35);

    overflow:visible;

    transform-style:preserve-3d;

    will-change:transform;

    transition:
    transform .25s ease-out,
    box-shadow .35s ease;

    animation:intro 1.5s ease;
}

/* intro */

@keyframes intro{

    from{
        opacity:0;

        transform:
        translateY(60px)
        scale(.96);
    }

    to{
        opacity:1;

        transform:
        translateY(0)
        scale(1);
    }
}

/* reflections */

.container::before{

    content:"";

    position:absolute;

    inset:-50%;

    background:
    linear-gradient(
        110deg,
        transparent 40%,
        rgba(255,255,255,.12),
        transparent 60%
    );

    transform:
    translateX(-120%)
    rotate(15deg);

    transition:1s;

    pointer-events:none;
}

.container:hover::before{

    transform:
    translateX(120%)
    rotate(15deg);
}

/* =========================
   HEADER
========================= */

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.logo{
    width:70px;
    height:70px;
    border-radius:50%;

    box-shadow:
    0 0 25px rgba(125,211,252,.25);
}

/* =========================
   DROPZONE
========================= */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(125,211,252,0.45);

    padding:40px;

    border-radius:15px;

    cursor:pointer;

    transition:.35s;

    position:relative;

    z-index:50;
}

.dropzone:hover{

    transform:translateY(-2px);

    border-color:#7dd3fc;

    background:
    rgba(125,211,252,0.06);

    box-shadow:
    inset 0 0 30px rgba(125,211,252,.15),
    0 0 20px rgba(125,211,252,.08);
}

/* =========================
   PLAYER
========================= */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    overflow:hidden;

    transition:.4s;

    isolation:isolate;
}

.glass-player:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    box-shadow:
    0 10px 40px rgba(125,211,252,.22);
}

/* ambient */

.ambient-wave{

    position:absolute;

    inset:-40%;

    z-index:0;

    background:

    radial-gradient(
        circle at 20% 20%,
        rgba(125,211,252,.18),
        transparent 30%
    ),

    radial-gradient(
        circle at 80% 30%,
        rgba(56,189,248,.16),
        transparent 35%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(186,230,253,.12),
        transparent 40%
    );

    filter:blur(45px);

    animation:
    waveMove 12s ease-in-out infinite alternate;

    pointer-events:none;
}

@keyframes waveMove{

    0%{
        transform:
        rotate(0deg)
        scale(1);
    }

    100%{
        transform:
        rotate(8deg)
        scale(1.08);
    }
}

/* buttons */

#playBtn{

    background:
    linear-gradient(
        135deg,
        #7dd3fc,
        #38bdf8
    );

    border:none;

    color:white;

    font-size:18px;

    border-radius:50%;

    width:42px;
    height:42px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#playBtn:hover{

    transform:scale(1.12);

    box-shadow:
    0 0 25px rgba(125,211,252,.7);
}

#stopBtn{

    background:
    rgba(255,255,255,0.1);

    border:none;

    color:white;

    border-radius:50%;

    width:35px;
    height:35px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#stopBtn:hover{

    transform:
    scale(1.12)
    rotate(90deg);

    background:
    rgba(255,255,255,0.2);
}

/* fft */

#visualizer{

    width:140px;
    height:42px;

    border-radius:12px;

    display:block;

    z-index:2;

    background:
    radial-gradient(
        circle at center,
        #111827,
        #020617
    );

    box-shadow:
    inset 0 0 25px rgba(0,0,0,.7),
    0 0 20px rgba(125,211,252,.08);

    overflow:hidden;
}

/* progress */

.progress-audio{

    flex:1;

    height:6px;

    background:
    rgba(255,255,255,0.1);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;

    z-index:2;
}

.progress-fill{

    height:100%;

    width:0%;

    background:
    linear-gradient(
        90deg,
        #7dd3fc,
        #38bdf8
    );
}

/* time */

#time{
    font-size:12px;
    z-index:2;
}

/* volume */

.volume-box{
    display:flex;
    align-items:center;
    gap:8px;
    z-index:2;
}

#volumeSlider{

    appearance:none;

    width:90px;

    height:4px;

    border-radius:20px;

    background:
    rgba(255,255,255,0.15);

    outline:none;
}

#volumeSlider::-webkit-slider-thumb{

    appearance:none;

    width:14px;
    height:14px;

    border-radius:50%;

    background:#7dd3fc;

    box-shadow:
    -100px 0 0 95px #7dd3fc;
}

/* cards */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:
    rgba(255,255,255,0.05);

    padding:20px;

    margin:10px;

    border-radius:15px;

    transition:.35s;
}

.card:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 10px 30px rgba(125,211,252,.16);
}

/* loader */

.loader{
    margin-top:30px;
    display:none;
}

.bar{

    width:6px;
    height:40px;

    background:#7dd3fc;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* tg */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #7dd3fc,
        #38bdf8
    );

    color:white;

    text-decoration:none;

    transition:.35s;
}

.tg-btn:hover{

    transform:
    translateY(-3px);

    box-shadow:
    0 10px 30px rgba(125,211,252,.35);
}

footer{
    margin-top:40px;
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="ring ring1"></div>
<div class="ring ring2"></div>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="container" id="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* =========================
   FILE UPLOAD
========================= */

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fileInput");

dropzone.addEventListener(
    "click",
    () => {
        fileInput.click();
    }
);

dropzone.addEventListener(
    "mouseenter",
    () => {
        dropzone.style.transform =
        "translateY(-2px) scale(1.01)";
    }
);

dropzone.addEventListener(
    "mouseleave",
    () => {
        dropzone.style.transform =
        "translateY(0px) scale(1)";
    }
);

/* =========================
   BACKGROUND
========================= */

const bgCanvas =
document.getElementById("bgCanvas");

const bgCtx =
bgCanvas.getContext("2d");

function resizeBG(){

    bgCanvas.width =
    window.innerWidth;

    bgCanvas.height =
    window.innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

const particles = [];

for(let i=0;i<140;i++){

    particles.push({

        x:Math.random()*bgCanvas.width,

        y:Math.random()*bgCanvas.height,

        r:Math.random()*2 + 0.4,

        sx:(Math.random()-0.5)*0.25,

        sy:(Math.random()-0.5)*0.25,

        a:Math.random()
    });
}

function animateBG(){

    requestAnimationFrame(
        animateBG
    );

    bgCtx.clearRect(
        0,
        0,
        bgCanvas.width,
        bgCanvas.height
    );

    bgCtx.strokeStyle =
    "rgba(125,211,252,.08)";

    for(let x=0;x<bgCanvas.width;x+=45){

        bgCtx.beginPath();

        bgCtx.moveTo(x,0);

        bgCtx.lineTo(x,bgCanvas.height);

        bgCtx.stroke();
    }

    for(let y=0;y<bgCanvas.height;y+=45){

        bgCtx.beginPath();

        bgCtx.moveTo(0,y);

        bgCtx.lineTo(bgCanvas.width,y);

        bgCtx.stroke();
    }

    particles.forEach(p=>{

        bgCtx.beginPath();

        bgCtx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        `rgba(186,230,253,${p.a})`;

        bgCtx.shadowBlur = 15;

        bgCtx.shadowColor =
        "rgba(125,211,252,.8)";

        bgCtx.fill();

        bgCtx.shadowBlur = 0;

        p.x += p.sx;
        p.y += p.sy;

        if(p.x < 0) p.x = bgCanvas.width;
        if(p.x > bgCanvas.width) p.x = 0;

        if(p.y < 0) p.y = bgCanvas.height;
        if(p.y > bgCanvas.height) p.y = 0;
    });
}

animateBG();

/* =========================
   PARALLAX
========================= */

const container =
document.getElementById("container");

const cursorGlow =
document.getElementById("cursorGlow");

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

document.addEventListener(
    "mousemove",
    e => {

        cursorGlow.style.left =
        e.clientX + "px";

        cursorGlow.style.top =
        e.clientY + "px";

        targetX =
        (window.innerWidth / 2 - e.clientX) / 22;

        targetY =
        (window.innerHeight / 2 - e.clientY) / 22;
    }
);

function animateContainer(){

    requestAnimationFrame(
        animateContainer
    );

    currentX +=
    (targetX - currentX) * 0.06;

    currentY +=
    (targetY - currentY) * 0.06;

    container.style.transform =

    `
    perspective(1800px)
    rotateY(${-currentX}deg)
    rotateX(${currentY}deg)
    `;
}

animateContainer();

document.addEventListener(
    "mouseleave",
    () => {

        targetX = 0;
        targetY = 0;
    }
);

</script>

</body>
</html>
