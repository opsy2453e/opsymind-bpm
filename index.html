<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

/* =========================================
BASE
========================================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    color:#f8fafc;

    text-align:center;

    overflow-x:hidden;

    background:

    radial-gradient(
        circle at top,
        #071426,
        #020617 55%,
        #000814
    );

    perspective:1200px;
}

/* =========================================
BACKGROUND
========================================= */

#bgCanvas{

    position:fixed;

    inset:0;

    width:100%;

    height:100%;

    z-index:-2;
}

/* =========================================
AURORA
========================================= */

#aurora{

    position:fixed;

    inset:0;

    z-index:-4;

    pointer-events:none;

    filter:blur(70px);

    opacity:.9;

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(56,189,248,.18),
        transparent 35%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(14,165,233,.14),
        transparent 40%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(125,211,252,.12),
        transparent 45%
    );

    animation:
    auroraMove 18s ease-in-out infinite alternate;
}

@keyframes auroraMove{

    0%{

        transform:
        scale(1)
        rotate(0deg);
    }

    50%{

        transform:
        scale(1.08)
        rotate(5deg);
    }

    100%{

        transform:
        scale(1.03)
        rotate(-5deg);
    }
}

/* =========================================
SPACE FOG
========================================= */

#spaceFog{

    position:fixed;

    inset:-20%;

    z-index:-5;

    pointer-events:none;

    opacity:.18;

    filter:blur(100px);

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(56,189,248,.10),
        transparent 40%
    ),

    radial-gradient(
        circle at 80% 60%,
        rgba(125,211,252,.08),
        transparent 45%
    );

    animation:
    fogMove 20s ease-in-out infinite alternate;
}

@keyframes fogMove{

    0%{
        transform:
        translate(0,0)
        scale(1);
    }

    100%{
        transform:
        translate(-40px,20px)
        scale(1.1);
    }
}

/* =========================================
LIQUID BLOBS
========================================= */

.liquidBlob{

    position:fixed;

    width:400px;

    height:400px;

    border-radius:50%;

    filter:blur(90px);

    opacity:.12;

    z-index:-4;

    pointer-events:none;

    animation:
    blobMove 18s ease-in-out infinite alternate;
}

@keyframes blobMove{

    0%{

        transform:
        translate(0,0)
        scale(1);
    }

    100%{

        transform:
        translate(60px,-40px)
        scale(1.2);
    }
}

/* =========================================
CONTAINER
========================================= */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.16);

    box-shadow:

    0 25px 80px rgba(56,189,248,.15),

    0 0 120px rgba(14,165,233,.08);

    overflow:hidden;

    animation:
    pageEnter 1.5s ease;
}

/* holographic glass */

.container::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:25px;

    pointer-events:none;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        transparent 30%,
        rgba(56,189,248,.05),
        transparent 70%
    );

    mix-blend-mode:screen;
}

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        scale(1.03)
        translateY(20px);
    }

    to{

        opacity:1;

        transform:
        scale(1)
        translateY(0);
    }
}

/* =========================================
HEADER
========================================= */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

/* =========================================
DROPZONE
========================================= */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(56,189,248,0.7);

    padding:40px;

    border-radius:15px;

    cursor:pointer;

    transition:.35s;
}

.dropzone:hover{

    border-color:#38bdf8;

    background:rgba(56,189,248,.08);
}

/* =========================================
PLAYER
========================================= */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:18px;

    background:rgba(255,255,255,.10);

    backdrop-filter:blur(20px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    overflow:hidden;
}

/* =========================================
BUTTONS
========================================= */

#playBtn{

    background:

    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );

    border:none;

    color:white;

    font-size:18px;

    border-radius:50%;

    width:42px;

    height:42px;

    cursor:pointer;
}

#stopBtn{

    background:rgba(255,255,255,0.1);

    border:none;

    color:white;

    border-radius:50%;

    width:35px;

    height:35px;

    cursor:pointer;
}

/* =========================================
VISUALIZER
========================================= */

canvas{

    width:140px;

    height:42px;

    border-radius:12px;

    display:block;

    background:

    radial-gradient(
        circle at center,
        #020617,
        #000
    );
}

/* =========================================
PROGRESS
========================================= */

.progress-audio{

    flex:1;

    height:6px;

    background:rgba(255,255,255,0.1);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;
}

.progress-fill{

    height:100%;

    width:0;

    background:

    linear-gradient(
        90deg,
        #38bdf8,
        #0ea5e9
    );
}

/* waveform */

#waveCanvas{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    opacity:.35;

    pointer-events:none;
}

/* =========================================
VOLUME
========================================= */

.volume-box{

    display:flex;

    align-items:center;

    gap:8px;
}

#volumeSlider{

    width:90px;
}

/* =========================================
CARDS
========================================= */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:rgba(255,255,255,0.07);

    padding:20px;

    margin:10px;

    border-radius:15px;

    transition:
    transform .35s ease,
    box-shadow .35s ease;
}

.card:hover{

    transform:

    perspective(1000px)
    rotateX(6deg)
    rotateY(-6deg)
    translateY(-6px);

    box-shadow:

    0 20px 40px rgba(56,189,248,.2);
}

/* =========================================
LOADER
========================================= */

.loader{

    margin-top:30px;

    display:none;
}

.bar{

    width:6px;

    height:40px;

    background:#38bdf8;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* =========================================
TG BUTTON
========================================= */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:

    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );

    color:white;

    text-decoration:none;
}

/* =========================================
STARS
========================================= */

.reactive-star{

    position:fixed;

    width:2px;

    height:2px;

    border-radius:50%;

    background:white;

    z-index:-2;

    pointer-events:none;

    box-shadow:

    0 0 10px white,
    0 0 20px #38bdf8;
}

</style>
</head>

<body>

<div id="aurora"></div>
<div id="spaceFog"></div>

<canvas id="bgCanvas"></canvas>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">

            <canvas id="waveCanvas"></canvas>

            <div class="progress-fill" id="progressFill"></div>

        </div>

        <span id="time">0:00</span>

        <div class="volume-box">

            <i class="ri-volume-up-line"></i>

            <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            >

        </div>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <div class="loader" id="loader">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <div class="cards" id="result"></div>

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<script>

/* =========================================
ELEMENTS
========================================= */

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fileInput");

const audio =
document.getElementById("audio");

const player =
document.getElementById("player");

const playBtn =
document.getElementById("playBtn");

const stopBtn =
document.getElementById("stopBtn");

const progressFill =
document.getElementById("progressFill");

const progressAudio =
document.getElementById("progressAudio");

const time =
document.getElementById("time");

const canvas =
document.getElementById("visualizer");

const ctx =
canvas.getContext("2d");

const loader =
document.getElementById("loader");

const volumeSlider =
document.getElementById("volumeSlider");

const waveCanvas =
document.getElementById("waveCanvas");

const wctx =
waveCanvas.getContext("2d");

/* =========================================
AUDIO REACTIVE
========================================= */

let reactiveAnalyser = null;
let reactiveData = null;

/* =========================================
FILE
========================================= */

dropzone.onclick = () =>
fileInput.click();

fileInput.onchange = () =>
handle(fileInput.files[0]);

function handle(file){

    const url =
    URL.createObjectURL(file);

    audio.src = url;

    audio.load();

    player.style.display = "flex";

    visualize();

    upload(file);
}

/* =========================================
PLAY
========================================= */

playBtn.onclick = () => {

    if(!audio.src) return;

    if(audio.paused){

        audio.play();

        playBtn.innerHTML =
        '<i class="ri-pause-fill"></i>';

    }else{

        audio.pause();

        playBtn.innerHTML =
        '<i class="ri-play-fill"></i>';
    }
};

/* =========================================
STOP
========================================= */

stopBtn.onclick = () => {

    audio.pause();

    audio.currentTime = 0;

    audio.src = "";

    player.style.display = "none";
};

/* =========================================
VOLUME
========================================= */

volumeSlider.oninput = () => {

    audio.volume =
    volumeSlider.value;
};

/* =========================================
PROGRESS
========================================= */

audio.ontimeupdate = () => {

    const percent =
    (audio.currentTime / audio.duration)
    * 100;

    progressFill.style.width =
    percent + "%";

    let min =
    Math.floor(audio.currentTime / 60);

    let sec =
    Math.floor(audio.currentTime % 60);

    if(sec < 10)
        sec = "0" + sec;

    time.innerText =
    `${min}:${sec}`;
};

progressAudio.onclick = e => {

    const width =
    progressAudio.clientWidth;

    audio.currentTime =

    (e.offsetX / width)
    * audio.duration;
};

/* =========================================
UPLOAD
========================================= */

function upload(file){

    loader.style.display = "block";

    const formData =
    new FormData();

    formData.append("file", file);

    fetch("/analyze", {

        method:"POST",

        body:formData
    })

    .then(res => res.json())

    .then(data => {

        loader.style.display =
        "none";

        document.getElementById(
        "result"
        ).innerHTML = `

        <div class="card">
            BPM: ${data.bpm}
        </div>

        <div class="card">
            Key: ${data.key}
        </div>

        <div class="card">
            Energy: ${data.energy}
        </div>
        `;
    });
}

/* =========================================
VISUALIZER
========================================= */

function visualize(){

    const audioCtx =
    new AudioContext();

    const src =
    audioCtx
    .createMediaElementSource(audio);

    const analyser =
    audioCtx.createAnalyser();

    reactiveAnalyser =
    analyser;

    src.connect(analyser);

    analyser.connect(
    audioCtx.destination
    );

    analyser.fftSize = 256;

    reactiveData =
    new Uint8Array(
        analyser.frequencyBinCount
    );

    canvas.width = 140;
    canvas.height = 42;

    function draw(){

        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(
        reactiveData
        );

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const barWidth =
        canvas.width /
        reactiveData.length;

        for(
            let i=0;
            i<reactiveData.length;
            i++
        ){

            const value =
            reactiveData[i];

            const height =
            (value / 255)
            * canvas.height;

            ctx.fillStyle =
            "#38bdf8";

            ctx.fillRect(

                i * barWidth,

                canvas.height - height,

                barWidth - 1,

                height
            );
        }

        drawWaveform();
        reactiveEffects();
    }

    draw();
}

/* =========================================
WAVEFORM
========================================= */

function drawWaveform(){

    waveCanvas.width =
    waveCanvas.offsetWidth;

    waveCanvas.height =
    waveCanvas.offsetHeight;

    wctx.clearRect(
        0,
        0,
        waveCanvas.width,
        waveCanvas.height
    );

    if(!reactiveData) return;

    wctx.beginPath();

    for(
        let i=0;
        i<reactiveData.length;
        i++
    ){

        const x =
        (i / reactiveData.length)
        * waveCanvas.width;

        const y =
        waveCanvas.height / 2 +

        (
            reactiveData[i] / 255
        ) * 10 - 5;

        if(i === 0){

            wctx.moveTo(x,y);

        }else{

            wctx.lineTo(x,y);
        }
    }

    wctx.strokeStyle =
    "rgba(125,211,252,.9)";

    wctx.lineWidth = 1.2;

    wctx.stroke();
}

/* =========================================
BACKGROUND
========================================= */

const bgCanvas =
document.getElementById("bgCanvas");

const bgCtx =
bgCanvas.getContext("2d");

function resizeBG(){

    bgCanvas.width =
    innerWidth;

    bgCanvas.height =
    innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

const particles = [];

for(let i=0;i<120;i++){

    particles.push({

        x:Math.random()*innerWidth,

        y:Math.random()*innerHeight,

        r:Math.random()*2,

        dx:(Math.random()-.5)*0.3,

        dy:(Math.random()-.5)*0.3
    });
}

function animateBG(){

    requestAnimationFrame(
        animateBG
    );

    bgCtx.clearRect(
        0,
        0,
        innerWidth,
        innerHeight
    );

    particles.forEach(p => {

        bgCtx.beginPath();

        bgCtx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        "rgba(125,211,252,.8)";

        bgCtx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0) p.x = innerWidth;
        if(p.x > innerWidth) p.x = 0;

        if(p.y < 0) p.y = innerHeight;
        if(p.y > innerHeight) p.y = 0;
    });
}

animateBG();

/* =========================================
REACTIVE STARS
========================================= */

const stars = [];

for(let i=0;i<80;i++){

    const star =
    document.createElement("div");

    star.className =
    "reactive-star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    document.body.appendChild(star);

    stars.push(star);
}

/* =========================================
REACTIVE FX
========================================= */

function reactiveEffects(){

    if(!reactiveData) return;

    let bass = 0;
    let highs = 0;

    for(let i=0;i<20;i++){

        bass += reactiveData[i];
    }

    for(let i=80;i<120;i++){

        highs += reactiveData[i];
    }

    bass /= 20;
    highs /= 40;

    const bassPower =
    bass / 255;

    const highPower =
    highs / 255;

    const aurora =
    document.getElementById(
    "aurora"
    );

    aurora.style.filter = `

        blur(${70 + bassPower * 40}px)

        brightness(${1 + bassPower * .4})

    `;

    stars.forEach(star => {

        star.style.transform = `

            scale(${
                1 + highPower * 2
            })

        `;

        star.style.opacity =
        .3 + highPower;
    });

    document.querySelector(
    ".container"
    ).style.boxShadow = `

        0 25px 80px rgba(
            56,189,248,
            ${0.15 + bassPower * .5}
        ),

        0 0 140px rgba(
            14,165,233,
            ${0.08 + bassPower * .4}
        )

    `;
}

/* =========================================
CAMERA MOTION
========================================= */

document.addEventListener(
    "mousemove",
    e => {

        const x =
        (e.clientX / innerWidth - .5);

        const y =
        (e.clientY / innerHeight - .5);

        document.querySelector(
        ".container"
        ).style.transform = `

            perspective(1200px)

            rotateY(${x * 6}deg)

            rotateX(${-y * 6}deg)

        `;
    }
);

/* =========================================
LIQUID BLOBS
========================================= */

for(let i=0;i<2;i++){

    const blob =
    document.createElement("div");

    blob.className =
    "liquidBlob";

    blob.style.background =
    i === 0
    ? "#38bdf8"
    : "#0ea5e9";

    blob.style.left =
    (i * 60) + "vw";

    blob.style.top =
    (i * 30) + "vh";

    document.body.appendChild(blob);
}

</script>

</body>
</html>
