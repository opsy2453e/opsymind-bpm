<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsyMind BPM</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

/* ===== ВСЁ ТВОЁ CSS БЕЗ ИЗМЕНЕНИЙ ===== */

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;

    background:
        radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
        radial-gradient(circle at 80% 30%, #0ea5e9, transparent),
        #020617;

    min-height:100vh;
}

.container{
    position:relative;
    margin:70px auto;
    padding:40px;
    max-width:760px;
    background:rgba(255,255,255,0.06);
    border-radius:28px;
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.dropzone{
    margin-top:34px;
    border:2px dashed rgba(56,189,248,0.55);
    padding:42px;
    border-radius:20px;
    cursor:pointer;
}

.glass-player{
    margin-top:24px;
    padding:18px;
    border-radius:28px;
    background:linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    display:none;
    flex-direction:column;
}

.visual-wrap{
    height:120px;
}

canvas{
    width:100%;
    height:120px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px 26px;
    border-radius:18px;
    margin:10px;
}

.loader{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>OpsyMind BPM</h1>
    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <div class="visual-wrap">
            <canvas id="visualizer"></canvas>
        </div>

        <audio id="audio"></audio>

    </div>

    <div class="loader" id="loader">
        Loading...
    </div>

    <div class="cards" id="result"></div>

</div>

<script>

/* ===== ТВОЙ JS (НЕ ТРОГАЛ, ТОЛЬКО FIX) ===== */

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const audio = document.getElementById("audio");
const player = document.getElementById("player");
const loader = document.getElementById("loader");

dropzone.onclick = () => fileInput.click();

fileInput.onchange = () => handle(fileInput.files[0]);

function handle(file){

    const url = URL.createObjectURL(file);

    audio.src = url;
    audio.load();

    player.style.display = "flex";

    upload(file);
}

/* UPLOAD */
function upload(file){

    loader.style.display = "block";
    document.getElementById("result").innerHTML = "";

    const formData = new FormData();
    formData.append("file", file);

    fetch("/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        loader.style.display = "none";

        /* ✅ FIX: защита от undefined */
        document.getElementById("result").innerHTML = `
            <div class="card">
                BPM: ${data?.bpm ?? "—"}
            </div>

            <div class="card">
                Key: ${data?.key ?? "—"}
            </div>

            <div class="card">
                Energy: ${data?.energy ?? "—"}
            </div>
        `;
    })
    .catch(() => {

        loader.style.display = "none";

        document.getElementById("result").innerHTML = `
            <div class="card">
                Error loading data
            </div>
        `;
    });
}

</script>

</body>
</html>
