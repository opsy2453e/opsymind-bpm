<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsyMind BPM</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;

    background:
        radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
        radial-gradient(circle at 80% 30%, #0ea5e9, transparent),
        #020617;

    min-height:100vh;
}

/* container */

.container{
    position:relative;

    margin:70px auto;

    padding:40px;

    max-width:760px;

    background:
        rgba(255,255,255,0.06);

    border-radius:28px;

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.6);

    overflow:hidden;

    animation:
        float 8s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* dropzone */

.dropzone{
    margin-top:34px;

    border:
        2px dashed rgba(56,189,248,0.55);

    padding:42px;

    border-radius:20px;

    cursor:pointer;
}

/* player */

.glass-player{
    margin-top:24px;

    padding:18px;

    border-radius:28px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.09),
            rgba(255,255,255,0.04)
        );

    display:none;
    flex-direction:column;
}

/* cards */

.card{
    background:rgba(255,255,255,0.05);

    padding:20px 26px;

    border-radius:18px;

    margin:10px;
}

/* loader */

.loader{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h1>OpsyMind BPM</h1>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">
        <audio id="audio"></audio>
    </div>

    <div class="loader" id="loader"></div>

    <div id="result"></div>

</div>

<script>

/* ===== ТВОЙ JS 1:1 (ТОЛЬКО FIX В FETCH) ===== */

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const audio = document.getElementById("audio");
const loader = document.getElementById("loader");

dropzone.onclick = () => fileInput.click();

fileInput.onchange = () => handle(fileInput.files[0]);

function handle(file){

    const url = URL.createObjectURL(file);

    audio.src = url;
    audio.load();

    upload(file);
}

/* UPLOAD */
function upload(file){

    loader.style.display = "block";

    document.getElementById("result").innerHTML = "";

    const formData = new FormData();
    formData.append("file", file);

    fetch("/analyze", {
        method: "POST",
        body: formData
    })

    // 🔥 FIX: безопасное чтение ответа
    .then(async (res) => {

        let data = {};

        try {
            data = await res.json();
        } catch (e) {
            data = null;
        }

        loader.style.display = "none";

        // защита от backend ошибки
        if (!res.ok || !data || data.error) {

            document.getElementById("result").innerHTML = `
                <div class="card">
                    ❌ ${data?.error || "Server error"}
                </div>
            `;

            return;
        }

        document.getElementById("result").innerHTML = `
            <div class="card">
                BPM: ${data.bpm}
            </div>

            <div class="card">
                Key: ${data.key}
            </div>

            <div class="card">
                Energy: ${data.energy}
            </div>
        `;
    })

    .catch(() => {

        loader.style.display = "none";

        document.getElementById("result").innerHTML = `
            <div class="card">
                ❌ Network error
            </div>
        `;
    });
}

</script>

</body>
</html>
