<style>

/* =========================================
SAFE CINEMATIC EXTENSION
========================================= */

#spaceFog{

    position:fixed;

    inset:-20%;

    z-index:-5;

    pointer-events:none;

    opacity:.18;

    filter:blur(100px);

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(56,189,248,.10),
        transparent 40%
    ),

    radial-gradient(
        circle at 80% 60%,
        rgba(125,211,252,.08),
        transparent 45%
    );

    animation:
    fogMove 20s ease-in-out infinite alternate;
}

@keyframes fogMove{

    0%{
        transform:
        translate(0,0)
        scale(1);
    }

    100%{
        transform:
        translate(-40px,20px)
        scale(1.1);
    }
}

/* holographic */

.container::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:25px;

    pointer-events:none;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        transparent 30%,
        rgba(56,189,248,.05),
        transparent 70%
    );

    mix-blend-mode:screen;
}

/* liquid */

.liquidBlob{

    position:fixed;

    width:400px;

    height:400px;

    border-radius:50%;

    filter:blur(90px);

    opacity:.12;

    z-index:-4;

    pointer-events:none;

    animation:
    blobMove 18s ease-in-out infinite alternate;
}

@keyframes blobMove{

    0%{
        transform:
        translate(0,0)
        scale(1);
    }

    100%{
        transform:
        translate(60px,-40px)
        scale(1.2);
    }
}

/* cards */

.card{

    transition:
    transform .35s ease,
    box-shadow .35s ease;
}

.card:hover{

    transform:

    perspective(1000px)
    rotateX(6deg)
    rotateY(-6deg)
    translateY(-6px);

    box-shadow:

    0 20px 40px rgba(56,189,248,.2);
}

/* waveform */

#waveCanvas{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    opacity:.35;

    pointer-events:none;
}

/* stars */

.reactive-star{

    position:fixed;

    width:2px;

    height:2px;

    border-radius:50%;

    background:white;

    z-index:-2;

    pointer-events:none;

    box-shadow:

    0 0 10px white,
    0 0 20px #38bdf8;
}

</style>

<script>

/* =========================================
SAFE EXTENSIONS
========================================= */

/* fog */

const fog =
document.createElement("div");

fog.id = "spaceFog";

document.body.appendChild(fog);

/* liquid blobs */

for(let i=0;i<2;i++){

    const blob =
    document.createElement("div");

    blob.className =
    "liquidBlob";

    blob.style.background =
    i === 0
    ? "#38bdf8"
    : "#0ea5e9";

    blob.style.left =
    (i * 60) + "vw";

    blob.style.top =
    (i * 30) + "vh";

    document.body.appendChild(blob);
}

/* =========================================
CAMERA MOTION
========================================= */

document.addEventListener(
    "mousemove",
    e => {

        const x =
        (e.clientX / innerWidth - .5);

        const y =
        (e.clientY / innerHeight - .5);

        const container =
        document.querySelector(
        ".container"
        );

        container.style.transform = `

            perspective(1200px)

            rotateY(${x * 6}deg)

            rotateX(${-y * 6}deg)

        `;
    }
);

/* =========================================
REACTIVE STARS
========================================= */

const stars = [];

for(let i=0;i<80;i++){

    const star =
    document.createElement("div");

    star.className =
    "reactive-star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    star.style.opacity =
    Math.random();

    document.body.appendChild(star);

    stars.push(star);
}

/* =========================================
WAVEFORM
========================================= */

const wave =
document.createElement("canvas");

wave.id = "waveCanvas";

document.querySelector(
".progress-audio"
).appendChild(wave);

const wctx =
wave.getContext("2d");

function resizeWave(){

    wave.width =
    wave.offsetWidth;

    wave.height =
    wave.offsetHeight;
}

resizeWave();

window.addEventListener(
    "resize",
    resizeWave
);

/* =========================================
SAFE AUDIO REACTIVE
========================================= */

function safeReactive(){

    requestAnimationFrame(
        safeReactive
    );

    if(
        typeof reactiveAnalyser ===
        "undefined"
    ) return;

    if(!reactiveAnalyser)
    return;

    if(!reactiveData)
    return;

    reactiveAnalyser
    .getByteFrequencyData(
        reactiveData
    );

    let bass = 0;
    let highs = 0;

    for(let i=0;i<20;i++){

        bass += reactiveData[i];
    }

    for(let i=80;i<120;i++){

        highs += reactiveData[i];
    }

    bass /= 20;
    highs /= 40;

    const bassPower =
    bass / 255;

    const highPower =
    highs / 255;

    /* aurora */

    const aurora =
    document.getElementById(
    "aurora"
    );

    if(aurora){

        aurora.style.filter = `

            blur(${70 + bassPower * 40}px)

            brightness(${1 + bassPower * .4})

        `;

        aurora.style.opacity =
        0.8 + bassPower * .4;
    }

    /* stars */

    stars.forEach(star => {

        star.style.transform = `

            scale(${
                1 + highPower * 2
            })

        `;

        star.style.opacity =
        0.3 + highPower;
    });

    /* waveform */

    wctx.clearRect(
        0,
        0,
        wave.width,
        wave.height
    );

    wctx.beginPath();

    for(
        let i=0;
        i<reactiveData.length;
        i++
    ){

        const x =
        (i / reactiveData.length)
        * wave.width;

        const y =
        wave.height / 2 +

        (
            reactiveData[i] / 255
        ) * 10 - 5;

        if(i === 0){

            wctx.moveTo(x,y);

        }else{

            wctx.lineTo(x,y);
        }
    }

    wctx.strokeStyle =
    "rgba(125,211,252,.9)";

    wctx.lineWidth = 1.2;

    wctx.stroke();

    /* glow */

    document.querySelector(
    ".container"
    ).style.boxShadow = `

        0 20px 80px rgba(
            56,189,248,
            ${0.15 + bassPower * .5}
        ),

        0 0 140px rgba(
            14,165,233,
            ${0.08 + bassPower * .4}
        )

    `;
}

safeReactive();

</script>
