<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

/* =========================================
BASE
========================================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    color:#f8fafc;

    text-align:center;

    overflow-x:hidden;

    background:#000;

    perspective:1200px;

    min-height:100vh;
}

/* =========================================
SPACE BACKGROUND
========================================= */

#bgCanvas{

    position:fixed;

    inset:0;

    width:100vw;
    height:100vh;

    z-index:-20;

    background:#000;
}

/* =========================================
SPACE GLOW
========================================= */

.space-glow{

    position:fixed;

    border-radius:50%;

    filter:blur(140px);

    pointer-events:none;

    z-index:-10;

    opacity:.22;

    mix-blend-mode:screen;

    animation:
    glowFloat 18s ease-in-out infinite alternate;
}

.glow1{

    width:600px;
    height:600px;

    background:
    radial-gradient(
        circle,
        rgba(56,189,248,.25),
        transparent 70%
    );

    top:-180px;
    left:-180px;
}

.glow2{

    width:900px;
    height:900px;

    background:
    radial-gradient(
        circle,
        rgba(125,211,252,.12),
        transparent 70%
    );

    right:-300px;
    top:10%;
}

.glow3{

    width:700px;
    height:700px;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.05),
        transparent 75%
    );

    bottom:-250px;
    left:20%;
}

@keyframes glowFloat{

    0%{

        transform:
        translateY(0px)
        translateX(0px)
        scale(1);
    }

    50%{

        transform:
        translateY(-30px)
        translateX(20px)
        scale(1.08);
    }

    100%{

        transform:
        translateY(20px)
        translateX(-20px)
        scale(1.02);
    }
}

/* =========================================
CONTAINER
========================================= */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    border-radius:34px;

    overflow:hidden;

    isolation:isolate;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.10),
        rgba(255,255,255,.03)
    );

    backdrop-filter:
    blur(34px)
    saturate(180%);

    -webkit-backdrop-filter:
    blur(34px)
    saturate(180%);

    border:
    1px solid rgba(255,255,255,.12);

    box-shadow:

    0 10px 40px rgba(0,0,0,.45),

    0 0 120px rgba(56,189,248,.10),

    inset 0 1px 1px rgba(255,255,255,.15),

    inset 0 -1px 1px rgba(255,255,255,.04);

    animation:

    pageEnter 1.2s ease,

    floatingPanel 9s ease-in-out infinite;
}

/* =========================================
TOP GLASS LIGHT
========================================= */

.container::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    pointer-events:none;

    background:

    linear-gradient(
        145deg,

        rgba(255,255,255,.22) 0%,

        rgba(255,255,255,.08) 18%,

        transparent 38%,

        transparent 62%,

        rgba(255,255,255,.05) 78%,

        rgba(255,255,255,.12) 100%
    );

    opacity:.9;

    mix-blend-mode:screen;
}

/* =========================================
MOVING LIQUID REFLECTION
========================================= */

.container::after{

    content:"";

    position:absolute;

    top:-120%;

    left:-40%;

    width:60%;

    height:320%;

    transform:rotate(18deg);

    pointer-events:none;

    background:

    linear-gradient(
        90deg,

        transparent,

        rgba(255,255,255,.16),

        rgba(255,255,255,.04),

        transparent
    );

    filter:blur(10px);

    animation:
    liquidReflection 8s linear infinite;
}

@keyframes liquidReflection{

    0%{

        transform:
        translateX(-220%)
        rotate(18deg);
    }

    100%{

        transform:
        translateX(420%)
        rotate(18deg);
    }
}

/* =========================================
ANIMATIONS
========================================= */

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        translateY(40px)
        scale(.96);
    }

    to{

        opacity:1;

        transform:
        translateY(0)
        scale(1);
    }
}

@keyframes floatingPanel{

    0%{

        transform:
        translateY(0px)
        rotateX(0deg)
        rotateY(0deg)
        scale(1);
    }

    25%{

        transform:
        translateY(-5px)
        rotateX(1deg)
        rotateY(-1deg)
        scale(1.002);
    }

    50%{

        transform:
        translateY(-10px)
        rotateX(-1deg)
        rotateY(1deg)
        scale(1.004);
    }

    75%{

        transform:
        translateY(-4px)
        rotateX(.5deg)
        rotateY(.5deg)
        scale(1.002);
    }

    100%{

        transform:
        translateY(0px)
        rotateX(0deg)
        rotateY(0deg)
        scale(1);
    }
}

/* =========================================
HEADER
========================================= */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

/* =========================================
DROPZONE
========================================= */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(255,255,255,.15);

    padding:40px;

    border-radius:20px;

    cursor:pointer;

    transition:.35s;

    background:rgba(255,255,255,.02);
}

.dropzone:hover{

    border-color:rgba(255,255,255,.3);

    background:rgba(255,255,255,.05);

    transform:translateY(-2px);
}

/* =========================================
PLAYER
========================================= */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:22px;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.025)
    );

    backdrop-filter:
    blur(24px)
    saturate(180%);

    border:
    1px solid rgba(255,255,255,.10);

    box-shadow:

    inset 0 1px 1px rgba(255,255,255,.10),

    0 0 40px rgba(255,255,255,.03);

    position:relative;

    overflow:hidden;

    display:none;

    align-items:center;

    gap:12px;
}

.glass-player::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    pointer-events:none;

    background:

    linear-gradient(
        120deg,

        transparent,

        rgba(255,255,255,.08),

        transparent
    );

    animation:
    playerShine 6s linear infinite;
}

@keyframes playerShine{

    0%{
        transform:translateX(-120%);
    }

    100%{
        transform:translateX(120%);
    }
}

/* =========================================
BUTTONS
========================================= */

#playBtn,
#stopBtn{

    border:none;

    color:white;

    border-radius:50%;

    cursor:pointer;

    backdrop-filter:blur(10px);

    background:rgba(255,255,255,.08);

    transition:.3s;
}

#playBtn{

    width:42px;
    height:42px;

    font-size:18px;
}

#stopBtn{

    width:35px;
    height:35px;
}

#playBtn:hover,
#stopBtn:hover{

    transform:scale(1.1);

    background:rgba(255,255,255,.15);
}

/* =========================================
VISUALIZER
========================================= */

canvas{

    width:140px;

    height:42px;

    border-radius:12px;

    display:block;

    background:#050505;
}

/* =========================================
PROGRESS
========================================= */

.progress-audio{

    flex:1;

    height:6px;

    background:rgba(255,255,255,0.08);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;
}

.progress-fill{

    height:100%;

    width:0;

    background:
    rgba(255,255,255,.8);
}

#waveCanvas{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    opacity:.35;

    pointer-events:none;
}

/* =========================================
VOLUME
========================================= */

.volume-box{

    display:flex;

    align-items:center;

    gap:8px;
}

#volumeSlider{

    width:90px;
}

/* =========================================
CARDS
========================================= */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.025)
    );

    border:
    1px solid rgba(255,255,255,.10);

    backdrop-filter:
    blur(20px);

    box-shadow:

    inset 0 1px 1px rgba(255,255,255,.08),

    0 10px 30px rgba(0,0,0,.25);

    transition:
    transform .4s ease,
    box-shadow .4s ease;

    padding:20px;

    margin:10px;

    border-radius:18px;
}

.card:hover{

    transform:

    translateY(-8px)
    scale(1.03);

    box-shadow:

    0 20px 60px rgba(56,189,248,.15),

    inset 0 1px 1px rgba(255,255,255,.12);
}

/* =========================================
LOADER
========================================= */

.loader{

    margin-top:30px;

    display:none;
}

.bar{

    width:6px;

    height:40px;

    background:white;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* =========================================
TG BUTTON
========================================= */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:15px;

    background:
    rgba(255,255,255,.06);

    color:white;

    text-decoration:none;

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(20px);

    transition:.35s;
}

.tg-btn:hover{

    transform:translateY(-3px);

    background:rgba(255,255,255,.1);
}

/* =========================================
FOOTER
========================================= */

footer{

    margin-top:30px;

    margin-bottom:20px;

    color:rgba(255,255,255,.45);

    font-size:14px;
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="space-glow glow1"></div>
<div class="space-glow glow2"></div>
<div class="space-glow glow3"></div>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">

            <canvas id="waveCanvas"></canvas>

            <div class="progress-fill" id="progressFill"></div>

        </div>

        <span id="time">0:00</span>

        <div class="volume-box">

            <i class="ri-volume-up-line"></i>

            <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            >

        </div>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <div class="loader" id="loader">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <div class="cards" id="result"></div>

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* SPACE */

const bgCanvas =
document.getElementById("bgCanvas");

const bgCtx =
bgCanvas.getContext("2d");

function resizeBG(){

    bgCanvas.width = innerWidth;
    bgCanvas.height = innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

const stars = [];

for(let i=0;i<500;i++){

    stars.push({

        x:Math.random()*innerWidth,

        y:Math.random()*innerHeight,

        r:Math.random()*2,

        speed:Math.random()*0.15 + 0.02,

        alpha:Math.random(),

        twinkle:Math.random()*0.02
    });
}

function animateBG(){

    requestAnimationFrame(
        animateBG
    );

    bgCtx.fillStyle =
    "#000";

    bgCtx.fillRect(
        0,
        0,
        innerWidth,
        innerHeight
    );

    stars.forEach(s => {

        s.alpha += s.twinkle;

        if(s.alpha >= 1 || s.alpha <= .2){

            s.twinkle *= -1;
        }

        bgCtx.beginPath();

        bgCtx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        `rgba(255,255,255,${s.alpha})`;

        bgCtx.shadowBlur = 15;

        bgCtx.shadowColor =
        "white";

        bgCtx.fill();

        bgCtx.shadowBlur = 0;

        s.y += s.speed;

        if(s.y > innerHeight){

            s.y = 0;

            s.x =
            Math.random()*innerWidth;
        }
    });
}

animateBG();

</script>

</body>
</html>
