<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:#f8fafc;
    text-align:center;
    overflow-x:hidden;
    background:
    radial-gradient(circle at top,#071426,#020617 55%,#000814);
    transform-origin:center;
}

/* cyber background */

#bgCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-2;
    background:#020617;
}

/* aurora */

#aurora{
    position:fixed;
    inset:0;
    z-index:-3;
    pointer-events:none;

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(56,189,248,.18),
        transparent 35%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(14,165,233,.14),
        transparent 40%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(125,211,252,.12),
        transparent 45%
    ),

    radial-gradient(
        circle at center,
        rgba(255,255,255,.03),
        transparent 70%
    );

    filter:blur(70px);

    animation:
    auroraMove 18s ease-in-out infinite alternate;
}

@keyframes auroraMove{

    0%{
        transform:
        scale(1)
        rotate(0deg)
        translateY(0px);
    }

    50%{
        transform:
        scale(1.08)
        rotate(6deg)
        translateY(-15px);
    }

    100%{
        transform:
        scale(1.03)
        rotate(-6deg)
        translateY(10px);
    }
}

/* glass reflections */

#reflection{

    position:fixed;

    inset:0;

    z-index:-1;

    pointer-events:none;

    background:

    linear-gradient(
        120deg,
        rgba(255,255,255,0.03),
        transparent 30%,
        rgba(125,211,252,0.04),
        transparent 70%
    );

    mix-blend-mode:screen;
}

/* container */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.16);

    box-shadow:

    0 25px 80px rgba(56,189,248,.15),

    0 0 120px rgba(14,165,233,.08),

    inset 0 1px 0 rgba(255,255,255,.08);

    overflow:hidden;

    animation:
    float 8s ease-in-out infinite,
    pageEnter 1.8s cubic-bezier(.16,1,.3,1);
}

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        scale(1.03)
        translateY(20px);
    }

    to{

        opacity:1;

        transform:
        scale(1)
        translateY(0);
    }
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* shine */

.container::before{

    content:"";

    position:absolute;

    inset:-50%;

    background:
    linear-gradient(
        110deg,
        transparent 40%,
        rgba(255,255,255,0.1),
        transparent 60%
    );

    transform:translateX(-120%) rotate(15deg);

    transition:0.8s;

    pointer-events:none;
}

.container:hover::before{

    transform:translateX(120%) rotate(15deg);
}

/* header */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

/* dropzone */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(56,189,248,0.7);

    padding:40px;

    border-radius:15px;

    cursor:pointer;

    transition:all .35s ease;
}

.dropzone:hover{

    border-color:#38bdf8;

    background:rgba(56,189,248,0.08);

    box-shadow:
    inset 0 0 25px rgba(56,189,248,.15);
}

/* player */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:18px;

    background:rgba(255,255,255,0.10);

    backdrop-filter:blur(20px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    overflow:hidden;

    transition:0.4s ease;
}

.glass-player:hover{

    transform:translateY(-2px) scale(1.01);

    box-shadow:
    0 10px 40px rgba(56,189,248,0.25);
}

/* ambient wave */

.ambient-wave{

    position:absolute;

    inset:-40%;

    background:

    radial-gradient(
        circle at 20% 20%,
        rgba(56,189,248,.20),
        transparent 30%
    ),

    radial-gradient(
        circle at 80% 30%,
        rgba(14,165,233,.18),
        transparent 35%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(125,211,252,.14),
        transparent 40%
    );

    filter:blur(45px);

    animation:
    waveMove 12s ease-in-out infinite alternate;

    pointer-events:none;
}

@keyframes waveMove{

    0%{
        transform:
        rotate(0deg)
        scale(1)
        translateY(0px);
    }

    50%{
        transform:
        rotate(8deg)
        scale(1.1)
        translateY(-10px);
    }

    100%{
        transform:
        rotate(-8deg)
        scale(1.05)
        translateY(8px);
    }
}

/* player shine */

.glass-player::after{

    content:'';

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.06),
        transparent
    );

    transform:translateX(-100%);

    animation:shine 6s linear infinite;
}

@keyframes shine{

    100%{
        transform:translateX(100%);
    }
}

/* buttons */

#playBtn{

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );

    border:none;

    color:white;

    font-size:18px;

    border-radius:50%;

    width:42px;

    height:42px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#playBtn:hover{

    transform:scale(1.12);

    box-shadow:
    0 0 25px rgba(56,189,248,.8);
}

#stopBtn{

    background:rgba(255,255,255,0.1);

    border:none;

    color:white;

    border-radius:50%;

    width:35px;

    height:35px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#stopBtn:hover{

    transform:scale(1.12) rotate(90deg);

    background:rgba(255,255,255,0.2);
}

/* FFT canvas */

canvas{

    width:140px;

    height:42px;

    border-radius:12px;

    display:block;

    z-index:2;

    background:
    radial-gradient(circle at center,#020617,#000);

    box-shadow:
    inset 0 0 25px rgba(0,0,0,.9),
    0 0 20px rgba(56,189,248,.08);

    position:relative;

    overflow:hidden;
}

/* progress */

.progress-audio{

    flex:1;

    height:6px;

    background:rgba(255,255,255,0.1);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;

    z-index:2;
}

.progress-fill{

    height:100%;

    width:0%;

    background:
    linear-gradient(
        90deg,
        #38bdf8,
        #0ea5e9
    );
}

/* time */

#time{

    font-size:12px;

    z-index:2;
}

/* volume */

.volume-box{

    display:flex;

    align-items:center;

    gap:8px;

    z-index:2;
}

.volume-box i{

    color:#7dd3fc;

    font-size:18px;
}

#volumeSlider{

    appearance:none;

    width:90px;

    height:4px;

    border-radius:20px;

    background:rgba(255,255,255,0.15);

    outline:none;

    overflow:hidden;

    cursor:pointer;
}

#volumeSlider::-webkit-slider-thumb{

    appearance:none;

    width:14px;

    height:14px;

    border-radius:50%;

    background:#38bdf8;

    box-shadow:-100px 0 0 95px #38bdf8;

    cursor:pointer;

    transition:.25s;
}

#volumeSlider::-webkit-slider-thumb:hover{

    transform:scale(1.2);

    box-shadow:
    -100px 0 0 95px #38bdf8,
    0 0 15px #38bdf8;
}

/* cards */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:rgba(255,255,255,0.07);

    padding:20px;

    margin:10px;

    border-radius:15px;

    transition:.35s;
}

.card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 10px 30px rgba(56,189,248,.18);
}

/* loader */

.loader{

    margin-top:30px;

    display:none;
}

.bar{

    width:6px;

    height:40px;

    background:#38bdf8;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* telegram button */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );

    color:white;

    text-decoration:none;

    transition:.35s;
}

.tg-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(14,165,233,.45);
}

/* footer */

footer{
    margin-top:40px;
}

</style>
</head>

<body>

<div id="aurora"></div>
<div id="reflection"></div>

<!-- CYBER BACKGROUND -->

<canvas id="bgCanvas"></canvas>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <!-- PLAYER -->

    <div class="glass-player" id="player">

        <div class="ambient-wave"></div>

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <span id="time">0:00</span>

        <div class="volume-box">

            <i class="ri-volume-up-line"></i>

            <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            >

        </div>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <!-- loader -->

    <div class="loader" id="loader">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <!-- results -->

    <div class="cards" id="result"></div>

    <!-- tg -->

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* =========================
   ELEMENTS
========================= */

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fileInput");

const audio =
document.getElementById("audio");

const player =
document.getElementById("player");

const playBtn =
document.getElementById("playBtn");

const stopBtn =
document.getElementById("stopBtn");

const progressFill =
document.getElementById("progressFill");

const progressAudio =
document.getElementById("progressAudio");

const time =
document.getElementById("time");

const canvas =
document.getElementById("visualizer");

const ctx =
canvas.getContext("2d");

const loader =
document.getElementById("loader");

const volumeSlider =
document.getElementById("volumeSlider");

const aurora =
document.getElementById("aurora");

/* =========================
   FILE
========================= */

dropzone.onclick = () =>
fileInput.click();

fileInput.onchange = () =>
handle(fileInput.files[0]);

function handle(file){

    const url =
    URL.createObjectURL(file);

    audio.src = url;

    audio.load();

    player.style.display = "flex";

    visualize();

    upload(file);
}

/* =========================
   PLAY
========================= */

playBtn.onclick = () => {

    if(!audio.src) return;

    if(audio.paused){

        audio.play();

        playBtn.innerHTML =
        '<i class="ri-pause-fill"></i>';

    }else{

        audio.pause();

        playBtn.innerHTML =
        '<i class="ri-play-fill"></i>';
    }
};

/* =========================
   STOP
========================= */

stopBtn.onclick = () => {

    audio.pause();

    audio.currentTime = 0;

    audio.src = "";

    player.style.display = "none";

    progressFill.style.width = "0%";

    time.innerText = "0:00";

    document.getElementById("result")
    .innerHTML = "";
};

/* =========================
   VOLUME
========================= */

volumeSlider.oninput = () => {

    audio.volume =
    volumeSlider.value;
};

/* =========================
   PROGRESS
========================= */

audio.ontimeupdate = () => {

    let percent =
    (audio.currentTime / audio.duration) * 100;

    progressFill.style.width =
    percent + "%";

    let min =
    Math.floor(audio.currentTime / 60);

    let sec =
    Math.floor(audio.currentTime % 60);

    if(sec < 10){
        sec = "0" + sec;
    }

    time.innerText =
    `${min}:${sec}`;
};

/* seek */

progressAudio.onclick = e => {

    let width =
    progressAudio.clientWidth;

    let clickX =
    e.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
};

/* =========================
   UPLOAD
========================= */

function upload(file){

    loader.style.display = "block";

    document.getElementById("result")
    .innerHTML = "";

    const formData =
    new FormData();

    formData.append("file", file);

    fetch("/analyze", {

        method:"POST",

        body:formData
    })

    .then(res => res.json())

    .then(data => {

        loader.style.display = "none";

        document.getElementById("result")
        .innerHTML = `

        <div class="card">
            BPM: ${data.bpm}
        </div>

        <div class="card">
            Key: ${data.key}
        </div>

        <div class="card">
            Energy: ${data.energy}
        </div>

        `;
    });
}

/* =========================
   VISUALIZER
========================= */

let reactiveAnalyser = null;
let reactiveData = null;

function visualize(){

    const audioCtx =
    new AudioContext();

    const src =
    audioCtx.createMediaElementSource(audio);

    const analyser =
    audioCtx.createAnalyser();

    reactiveAnalyser = analyser;

    src.connect(analyser);

    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;

    analyser.smoothingTimeConstant = 0.93;

    const bufferLength =
    analyser.frequencyBinCount;

    reactiveData =
    new Uint8Array(bufferLength);

    const dataArray =
    new Uint8Array(bufferLength);

    canvas.width = 140;

    canvas.height = 42;

    const stars = [];

    for(let i=0;i<90;i++){

        stars.push({

            x:Math.random()*canvas.width,

            y:Math.random()*canvas.height,

            size:Math.random()*1.8,

            speed:Math.random()*0.15 + 0.03,

            alpha:Math.random()
        });
    }

    function drawSpace(){

        const gradient =
        ctx.createLinearGradient(
            0,
            0,
            canvas.width,
            canvas.height
        );

        gradient.addColorStop(0,"#000000");

        gradient.addColorStop(0.5,"#071426");

        gradient.addColorStop(1,"#00111f");

        ctx.fillStyle = gradient;

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const nebula =
        ctx.createRadialGradient(
            70,
            20,
            0,
            70,
            20,
            60
        );

        nebula.addColorStop(
            0,
            "rgba(56,189,248,.18)"
        );

        nebula.addColorStop(
            1,
            "transparent"
        );

        ctx.fillStyle = nebula;

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        stars.forEach(star => {

            ctx.beginPath();

            ctx.arc(
                star.x,
                star.y,
                star.size,
                0,
                Math.PI*2
            );

            ctx.fillStyle =
            `rgba(255,255,255,${star.alpha})`;

            ctx.fill();

            star.y += star.speed;

            if(star.y > canvas.height){

                star.y = 0;

                star.x =
                Math.random()*canvas.width;
            }
        });
    }

    function draw(){

        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        drawSpace();

        let barWidth =
        canvas.width / bufferLength;

        for(let i=0;i<bufferLength;i++){

            let value = dataArray[i];

            let percent = value / 255;

            let height =
            canvas.height * percent;

            let offset =
            canvas.height - height;

            ctx.shadowBlur = 14;

            ctx.shadowColor =
            "rgba(56,189,248,.9)";

            ctx.beginPath();

            ctx.roundRect(

                i * barWidth,

                offset,

                barWidth - 1.8,

                height,

                6
            );

            const grad =
            ctx.createLinearGradient(
                0,
                offset,
                0,
                canvas.height
            );

            grad.addColorStop(
                0,
                "#7dd3fc"
            );

            grad.addColorStop(
                1,
                "#0ea5e9"
            );

            ctx.fillStyle = grad;

            ctx.fill();

            ctx.shadowBlur = 0;
        }
    }

    draw();
}

/* =========================
   CYBER BACKGROUND
========================= */

const bgCanvas =
document.getElementById("bgCanvas");

const bgCtx =
bgCanvas.getContext("2d");

function resizeBG(){

    bgCanvas.width =
    window.innerWidth;

    bgCanvas.height =
    window.innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

/* particles */

const bgParticles = [];

for(let i=0;i<120;i++){

    bgParticles.push({

        x:Math.random()*bgCanvas.width,

        y:Math.random()*bgCanvas.height,

        radius:Math.random()*2 + 0.5,

        speedX:(Math.random()-0.5)*0.2,

        speedY:(Math.random()-0.5)*0.2,

        alpha:Math.random()
    });
}

/* grid */

const gridOffset = {
    x:0,
    y:0
};

function drawGrid(glowStrength = 1){

    const size = 45;

    bgCtx.strokeStyle =
    `rgba(56,189,248,${0.05 + glowStrength * 0.06})`;

    bgCtx.lineWidth = 1;

    bgCtx.shadowBlur =
    10 + glowStrength * 20;

    bgCtx.shadowColor =
    "rgba(56,189,248,.8)";

    for(
        let x = gridOffset.x % size;
        x < bgCanvas.width;
        x += size
    ){

        bgCtx.beginPath();

        bgCtx.moveTo(x,0);

        bgCtx.lineTo(x,bgCanvas.height);

        bgCtx.stroke();
    }

    for(
        let y = gridOffset.y % size;
        y < bgCanvas.height;
        y += size
    ){

        bgCtx.beginPath();

        bgCtx.moveTo(0,y);

        bgCtx.lineTo(bgCanvas.width,y);

        bgCtx.stroke();
    }

    bgCtx.shadowBlur = 0;

    gridOffset.x += 0.08;

    gridOffset.y += 0.03;
}

/* particles */

function drawParticles(highs = 0){

    bgParticles.forEach(p => {

        bgCtx.beginPath();

        bgCtx.arc(
            p.x,
            p.y,
            p.radius + highs * 2,
            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        `rgba(125,211,252,${p.alpha + highs * 0.7})`;

        bgCtx.shadowBlur = 15 + highs * 25;

        bgCtx.shadowColor =
        "rgba(56,189,248,.8)";

        bgCtx.fill();

        bgCtx.shadowBlur = 0;

        p.x += p.speedX;

        p.y += p.speedY;

        if(p.x < 0)
            p.x = bgCanvas.width;

        if(p.x > bgCanvas.width)
            p.x = 0;

        if(p.y < 0)
            p.y = bgCanvas.height;

        if(p.y > bgCanvas.height)
            p.y = 0;
    });
}

/* glow */

function drawGlow(pulse = 0){

    const glow =
    bgCtx.createRadialGradient(

        bgCanvas.width/2,
        bgCanvas.height/2,
        0,

        bgCanvas.width/2,
        bgCanvas.height/2,
        bgCanvas.width/1.2
    );

    glow.addColorStop(
        0,
        `rgba(56,189,248,${0.10 + pulse * 0.25})`
    );

    glow.addColorStop(
        1,
        "transparent"
    );

    bgCtx.fillStyle = glow;

    bgCtx.fillRect(
        0,
        0,
        bgCanvas.width,
        bgCanvas.height
    );
}

/* animate */

function animateBG(){

    requestAnimationFrame(
        animateBG
    );

    bgCtx.clearRect(
        0,
        0,
        bgCanvas.width,
        bgCanvas.height
    );

    let bass = 0;
    let highs = 0;

    if(reactiveAnalyser && reactiveData){

        reactiveAnalyser
        .getByteFrequencyData(reactiveData);

        for(let i=0;i<20;i++){

            bass += reactiveData[i];
        }

        for(let i=80;i<120;i++){

            highs += reactiveData[i];
        }

        bass /= 20;
        highs /= 40;
    }

    const pulse =
    bass / 255;

    const highPulse =
    highs / 255;

    aurora.style.filter =
    `blur(${70 + pulse * 40}px)`;

    aurora.style.opacity =
    0.8 + pulse * 0.5;

    document.querySelector(".container")
    .style.boxShadow = `

        0 25px 90px rgba(56,189,248,${
            0.15 + pulse * 0.5
        }),

        0 0 160px rgba(14,165,233,${
            0.08 + pulse * 0.4
        }),

        inset 0 1px 0 rgba(255,255,255,.08)

    `;

    drawGlow(pulse);

    drawGrid(pulse);

    drawParticles(highPulse);
}

animateBG();

/* =========================
   PARALLAX DEPTH
========================= */

document.addEventListener("mousemove", e => {

    const x =
    (e.clientX / window.innerWidth - 0.5);

    const y =
    (e.clientY / window.innerHeight - 0.5);

    document.querySelector(".container")
    .style.transform = `

        translateY(-4px)
        rotateY(${x * 5}deg)
        rotateX(${-y * 5}deg)

    `;
});

/* =========================
   STAR BURSTS
========================= */

setInterval(() => {

    const burst =
    document.createElement("div");

    burst.style.position = "fixed";

    burst.style.left =
    Math.random()*100 + "vw";

    burst.style.top =
    Math.random()*100 + "vh";

    burst.style.width = "3px";

    burst.style.height = "3px";

    burst.style.borderRadius = "50%";

    burst.style.background = "white";

    burst.style.boxShadow = `

        0 0 20px white,
        0 0 40px #38bdf8

    `;

    burst.style.pointerEvents = "none";

    burst.style.zIndex = "-1";

    burst.animate(

        [
            {
                opacity:0,
                transform:"scale(0)"
            },

            {
                opacity:1,
                transform:"scale(1.8)"
            },

            {
                opacity:0,
                transform:"scale(0)"
            }
        ],

        {
            duration:1600,
            easing:"ease-out"
        }
    );

    document.body.appendChild(burst);

    setTimeout(() => {

        burst.remove();

    },1600);

},500);

</script>
