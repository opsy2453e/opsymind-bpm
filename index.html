<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsyMind BPM</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;

    background:
        radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
        radial-gradient(circle at 80% 30%, #0ea5e9, transparent),
        #020617;

    min-height:100vh;
}

/* container */

.container{
    position:relative;

    margin:70px auto;

    padding:40px;

    max-width:760px;

    background:
        rgba(255,255,255,0.06);

    border-radius:28px;

    backdrop-filter:blur(25px);

    border:
        1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.6);

    overflow:hidden;

    animation:
        float 8s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* shine */

.container::before{
    content:"";

    position:absolute;

    inset:-50%;

    background:
        linear-gradient(
            110deg,
            transparent 40%,
            rgba(255,255,255,0.1),
            transparent 60%
        );

    transform:
        translateX(-120%)
        rotate(15deg);

    transition:.8s;

    pointer-events:none;
}

.container:hover::before{
    transform:
        translateX(120%)
        rotate(15deg);
}

/* header */

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;
}

.logo{
    width:72px;
    height:72px;
    border-radius:50%;

    box-shadow:
        0 0 20px rgba(56,189,248,0.2);
}

h1{
    margin:0;

    font-size:34px;

    font-weight:700;

    letter-spacing:1px;
}

/* dropzone */

.dropzone{
    margin-top:34px;

    border:
        2px dashed rgba(56,189,248,0.55);

    padding:42px;

    border-radius:20px;

    cursor:pointer;

    transition:
        transform .3s ease,
        background .3s ease,
        border .3s ease,
        box-shadow .3s ease;
}

.dropzone:hover{

    transform:
        translateY(-3px);

    background:
        rgba(255,255,255,0.04);

    border-color:#38bdf8;

    box-shadow:
        0 0 25px rgba(56,189,248,0.15);
}

/* player */

.glass-player{
    margin-top:24px;

    padding:18px;

    border-radius:28px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.09),
            rgba(255,255,255,0.04)
        );

    backdrop-filter:blur(30px);

    display:none;
    flex-direction:column;
    gap:18px;

    border:
        1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 0 40px rgba(56,189,248,0.08);

    position:relative;

    overflow:hidden;
}

/* top glow */

.glass-player::before{
    content:"";

    position:absolute;

    inset:-2px;

    background:
        radial-gradient(
            circle at top left,
            rgba(56,189,248,0.22),
            transparent 35%
        );

    pointer-events:none;
}

/* visualizer */

.visual-wrap{
    position:relative;

    height:120px;

    border-radius:22px;

    overflow:hidden;

    background:
        linear-gradient(
            180deg,
            rgba(2,6,23,0.7),
            rgba(15,23,42,0.95)
        );

    border:
        1px solid rgba(255,255,255,0.06);

    box-shadow:
        inset 0 0 25px rgba(0,0,0,0.4),
        0 0 25px rgba(14,165,233,0.08);
}

canvas{
    display:block;
    width:100%;
    height:120px;
}

/* particles */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.particles::before,
.particles::after{
    content:"";

    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    filter:blur(50px);

    opacity:.18;

    animation:
        pulseGlow 5s ease-in-out infinite;
}

.particles::before{
    background:#38bdf8;

    top:-60px;
    left:-40px;
}

.particles::after{
    background:#0ea5e9;

    right:-60px;
    bottom:-80px;

    animation-delay:2s;
}

@keyframes pulseGlow{

    0%{
        transform:scale(1);
        opacity:.14;
    }

    50%{
        transform:scale(1.2);
        opacity:.25;
    }

    100%{
        transform:scale(1);
        opacity:.14;
    }
}

/* controls */

.player-controls{
    display:flex;
    align-items:center;
    gap:16px;
}

/* buttons */

#playBtn,
#stopBtn{
    border:none;

    color:white;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:
        transform .25s ease,
        box-shadow .25s ease,
        background .25s ease;
}

#playBtn{
    width:56px;
    height:56px;

    border-radius:50%;

    font-size:24px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #0ea5e9
        );

    box-shadow:
        0 10px 25px rgba(14,165,233,0.35),
        inset 0 1px 1px rgba(255,255,255,0.2);
}

#playBtn:hover{

    transform:
        translateY(-2px)
        scale(1.06);

    box-shadow:
        0 15px 30px rgba(14,165,233,0.45),
        0 0 20px rgba(56,189,248,0.5);
}

#playBtn:active{
    transform:scale(.95);
}

#stopBtn{
    width:44px;
    height:44px;

    border-radius:50%;

    font-size:18px;

    background:
        rgba(255,255,255,0.08);

    border:
        1px solid rgba(255,255,255,0.06);
}

#stopBtn:hover{

    transform:
        translateY(-2px);

    background:
        rgba(255,255,255,0.15);

    box-shadow:
        0 8px 20px rgba(255,255,255,0.08);
}

/* progress */

.progress-audio{
    flex:1;

    height:10px;

    background:
        rgba(255,255,255,0.08);

    border-radius:999px;

    overflow:hidden;

    cursor:pointer;

    position:relative;
}

.progress-fill{
    height:100%;
    width:0%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #38bdf8,
            #0ea5e9,
            #38bdf8
        );

    background-size:200% 100%;

    animation:
        moveGradient 3s linear infinite;

    box-shadow:
        0 0 12px rgba(56,189,248,0.5);
}

@keyframes moveGradient{

    from{
        background-position:0% 0%;
    }

    to{
        background-position:200% 0%;
    }
}

#time{
    font-size:12px;
    min-width:44px;
    opacity:.8;
}

/* 🌍 PREMIUM VOLUME */

.volume-wrap{
    position:relative;

    width:54px;
    height:120px;

    display:flex;
    align-items:center;
    justify-content:center;

    margin-left:6px;
}

/* glass background */

.volume-wrap::before{
    content:"";

    position:absolute;

    width:26px;
    height:100px;

    border-radius:999px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.12),
            rgba(255,255,255,0.03)
        );

    border:
        1px solid rgba(255,255,255,0.08);

    box-shadow:
        inset 0 0 12px rgba(255,255,255,0.05),
        0 0 20px rgba(56,189,248,0.08);

    backdrop-filter:blur(12px);
}

/* active line */

.volume-track-fill{
    position:absolute;

    bottom:10px;

    width:12px;
    height:80px;

    border-radius:999px;

    background:
        linear-gradient(
            180deg,
            #67e8f9,
            #0ea5e9,
            #0284c7
        );

    box-shadow:
        0 0 20px rgba(56,189,248,0.45),
        0 0 40px rgba(14,165,233,0.2);

    transition:
        height .12s linear;
}

/* invisible slider */

#volumeSlider{
    -webkit-appearance:none;
    appearance:none;

    position:absolute;

    width:100px;
    height:100px;

    opacity:0;

    cursor:pointer;

    transform:rotate(-90deg);

    z-index:20;
}

/* 🌍 planet */

.volume-planet{
    position:absolute;

    left:50%;

    width:38px;
    height:38px;

    display:flex;
    align-items:center;
    justify-content:center;

    transform:
        translateX(-50%);

    border-radius:50%;

    font-size:30px;

    pointer-events:none;

    transition:
        top .12s linear,
        transform .18s ease,
        filter .18s ease,
        box-shadow .18s ease;

    background:
        radial-gradient(
            circle at 30% 30%,
            rgba(255,255,255,0.18),
            rgba(255,255,255,0.02)
        );

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 22px rgba(56,189,248,0.18),
        inset 0 1px 2px rgba(255,255,255,0.08);
}

/* orbit */

.volume-planet::before{
    content:"";

    position:absolute;

    width:54px;
    height:54px;

    border-radius:50%;

    border:
        1px solid rgba(56,189,248,0.18);

    animation:
        orbitPulse 4s ease-in-out infinite;
}

@keyframes orbitPulse{

    0%{
        transform:scale(1);
        opacity:.25;
    }

    50%{
        transform:scale(1.12);
        opacity:.5;
    }

    100%{
        transform:scale(1);
        opacity:.25;
    }
}

/* result cards */

.cards{
    margin-top:30px;

    display:flex;
    justify-content:center;
    flex-wrap:wrap;

    gap:14px;
}

.card{
    background:
        rgba(255,255,255,0.05);

    padding:20px 26px;

    border-radius:18px;

    border:
        1px solid rgba(255,255,255,0.08);

    transition:
        transform .3s ease,
        background .3s ease,
        box-shadow .3s ease;
}

.card:hover{

    transform:
        translateY(-4px);

    background:
        rgba(255,255,255,0.08);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.25),
        0 0 20px rgba(56,189,248,0.08);
}

/* loader */

.loader{
    margin-top:30px;
    display:none;
}

.bar{
    width:6px;
    height:40px;

    background:#38bdf8;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* telegram */

.tg-btn{
    margin-top:34px;

    display:inline-block;

    padding:12px 26px;

    border-radius:14px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #0ea5e9
        );

    color:white;

    text-decoration:none;

    transition:
        transform .3s ease,
        box-shadow .3s ease;
}

.tg-btn:hover{

    transform:
        translateY(-2px);

    box-shadow:
        0 10px 25px rgba(14,165,233,0.35),
        0 0 18px rgba(56,189,248,0.25);
}

/* footer */

footer{
    margin-top:40px;
    opacity:.7;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <img
            src="/static/avatar.png"
            class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div
        class="dropzone"
        id="dropzone"
    >
        📤 Перетащи MP3 или нажми
    </div>

    <input
        type="file"
        id="fileInput"
        hidden
    >

    <!-- PLAYER -->

    <div
        class="glass-player"
        id="player"
    >

        <!-- visual -->

        <div class="visual-wrap">

            <canvas id="visualizer"></canvas>

            <div class="particles"></div>

        </div>

        <!-- controls -->

        <div class="player-controls">

            <button id="playBtn">
                <i class="ri-play-fill"></i>
            </button>

            <div
                class="progress-audio"
                id="progressAudio"
            >
                <div
                    class="progress-fill"
                    id="progressFill"
                ></div>
            </div>

            <span id="time">
                0:00
            </span>

            <button id="stopBtn">
                <i class="ri-close-line"></i>
            </button>

            <!-- 🌍 volume -->

            <div class="volume-wrap">

                <div
                    class="volume-track-fill"
                    id="volumeTrackFill"
                ></div>

                <input
                    type="range"
                    id="volumeSlider"
                    min="0"
                    max="100"
                    value="100"
                >

                <div
                    class="volume-planet"
                    id="volumePlanet"
                >
                    🌍
                </div>

            </div>

        </div>

        <audio id="audio"></audio>

    </div>

    <!-- loader -->

    <div
        class="loader"
        id="loader"
    >
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <!-- result -->

    <div
        class="cards"
        id="result"
    ></div>

    <!-- telegram -->

    <a
        href="https://t.me/OpsyMindBot"
        target="_blank"
        class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
    🤖 @OpsyMindBot
</footer>

<script>

const dropzone =
    document.getElementById("dropzone");

const fileInput =
    document.getElementById("fileInput");

const audio =
    document.getElementById("audio");

const player =
    document.getElementById("player");

const playBtn =
    document.getElementById("playBtn");

const stopBtn =
    document.getElementById("stopBtn");

const progressFill =
    document.getElementById("progressFill");

const progressAudio =
    document.getElementById("progressAudio");

const time =
    document.getElementById("time");

const canvas =
    document.getElementById("visualizer");

const ctx =
    canvas.getContext("2d");

const loader =
    document.getElementById("loader");

const volumeSlider =
    document.getElementById("volumeSlider");

const volumePlanet =
    document.getElementById("volumePlanet");

const volumeTrackFill =
    document.getElementById("volumeTrackFill");

/* upload */

dropzone.onclick = () =>
    fileInput.click();

fileInput.onchange = () =>
    handle(fileInput.files[0]);

function handle(file){

    const url =
        URL.createObjectURL(file);

    audio.src = url;

    audio.load();

    player.style.display = "flex";

    visualize();

    upload(file);
}

/* play */

playBtn.onclick = () => {

    if(!audio.src) return;

    if(audio.paused){

        audio.play();

        playBtn.innerHTML =
            '<i class="ri-pause-fill"></i>';

    } else {

        audio.pause();

        playBtn.innerHTML =
            '<i class="ri-play-fill"></i>';
    }
};

/* stop */

stopBtn.onclick = () => {

    audio.pause();

    audio.currentTime = 0;

    audio.src = "";

    player.style.display = "none";

    progressFill.style.width = "0%";

    time.innerText = "0:00";

    document.getElementById("result").innerHTML = "";
};

/* progress */

audio.ontimeupdate = () => {

    let percent =
        (audio.currentTime / audio.duration) * 100;

    progressFill.style.width =
        percent + "%";

    let min =
        Math.floor(audio.currentTime / 60);

    let sec =
        Math.floor(audio.currentTime % 60);

    if(sec < 10){
        sec = "0" + sec;
    }

    time.innerText =
        `${min}:${sec}`;
};

/* seek */

progressAudio.onclick = e => {

    let width =
        progressAudio.clientWidth;

    let clickX =
        e.offsetX;

    audio.currentTime =
        (clickX / width) * audio.duration;
};

/* upload analyze */

function upload(file){

    loader.style.display = "block";

    document.getElementById("result").innerHTML = "";

    const formData =
        new FormData();

    formData.append("file", file);

    fetch("/analyze", {

        method:"POST",
        body:formData

    })
    .then(res => res.json())
    .then(data => {

        loader.style.display = "none";

        document.getElementById("result").innerHTML = `
            <div class="card">
                BPM: ${data.bpm}
            </div>

            <div class="card">
                Key: ${data.key}
            </div>

            <div class="card">
                Energy: ${data.energy}
            </div>
        `;
    });
}

/* visualizer */

function visualize(){

    const audioCtx =
        new AudioContext();

    const src =
        audioCtx.createMediaElementSource(audio);

    const analyser =
        audioCtx.createAnalyser();

    src.connect(analyser);

    analyser.connect(audioCtx.destination);

    analyser.fftSize = 256;

    const bufferLength =
        analyser.frequencyBinCount;

    const dataArray =
        new Uint8Array(bufferLength);

    canvas.width =
        canvas.offsetWidth;

    canvas.height = 120;

    let particles = [];

    function createParticles(){

        particles = [];

        for(let i = 0; i < 40; i++){

            particles.push({

                x:
                    Math.random() * canvas.width,

                y:
                    Math.random() * canvas.height,

                r:
                    Math.random() * 2 + 1,

                speed:
                    Math.random() * 0.6 + 0.2
            });
        }
    }

    createParticles();

    function draw(){

        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const gradient =
            ctx.createLinearGradient(
                0,
                0,
                0,
                canvas.height
            );

        gradient.addColorStop(
            0,
            "rgba(56,189,248,0.18)"
        );

        gradient.addColorStop(
            1,
            "rgba(2,6,23,0)"
        );

        ctx.fillStyle = gradient;

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const barWidth =
            canvas.width / bufferLength * 1.7;

        let x = 0;

        for(let i = 0; i < bufferLength; i++){

            const value =
                dataArray[i];

            const h =
                value * 0.42;

            const grd =
                ctx.createLinearGradient(
                    0,
                    canvas.height - h,
                    0,
                    canvas.height
                );

            grd.addColorStop(
                0,
                "#67e8f9"
            );

            grd.addColorStop(
                1,
                "#0ea5e9"
            );

            ctx.fillStyle = grd;

            ctx.shadowBlur = 18;

            ctx.shadowColor = "#38bdf8";

            const radius = 6;

            ctx.beginPath();

            ctx.roundRect(
                x,
                canvas.height - h,
                barWidth - 2,
                h,
                radius
            );

            ctx.fill();

            x += barWidth;
        }

        particles.forEach(p => {

            p.y -= p.speed;

            if(p.y < -10){

                p.y =
                    canvas.height + 10;

                p.x =
                    Math.random() * canvas.width;
            }

            ctx.beginPath();

            ctx.fillStyle =
                "rgba(255,255,255,0.12)";

            ctx.arc(
                p.x,
                p.y,
                p.r,
                0,
                Math.PI * 2
            );

            ctx.fill();
        });
    }

    draw();
}

/* 🌍 volume */

function updatePlanet(){

    const value =
        volumeSlider.value;

    audio.volume =
        value / 100;

    /* planet position */

    const top =
        82 - (value * 0.72);

    volumePlanet.style.top =
        top + "px";

    /* active line */

    volumeTrackFill.style.height =
        `${value * 0.8}px`;

    /* animation */

    const scale =
        1 + value / 450;

    volumePlanet.style.transform =
        `
        translateX(-50%)
        scale(${scale})
        rotate(${value / 12}deg)
        `;

    volumePlanet.style.filter =
        `
        drop-shadow(
            0 0 ${value / 3}px
            rgba(56,189,248,0.55)
        )
        `;
}

volumeSlider.oninput =
    updatePlanet;

updatePlanet();

</script>

</body>
</html>
