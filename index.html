<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

/* =========================================
BASE
========================================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    color:#f8fafc;

    text-align:center;

    overflow-x:hidden;

    background:#000;

    perspective:1200px;

    min-height:100vh;
}

/* =========================================
SPACE BACKGROUND
========================================= */

#bgCanvas{

    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    z-index:-20;

    background:#000;
}

/* =========================================
SPACE GLOW
========================================= */

.space-glow{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    pointer-events:none;

    z-index:-10;

    opacity:.22;

    mix-blend-mode:screen;

    animation:
    glowFloat 18s ease-in-out infinite alternate;
}

.glow1{

    width:500px;
    height:500px;

    background:
    radial-gradient(
        circle,
        rgba(56,189,248,.35),
        transparent 70%
    );

    top:-120px;
    left:-100px;
}

.glow2{

    width:700px;
    height:700px;

    background:
    radial-gradient(
        circle,
        rgba(125,211,252,.18),
        transparent 70%
    );

    right:-200px;
    top:20%;
}

.glow3{

    width:600px;
    height:600px;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.08),
        transparent 75%
    );

    bottom:-200px;
    left:30%;
}

@keyframes glowFloat{

    0%{

        transform:
        translateY(0px)
        translateX(0px)
        scale(1);
    }

    50%{

        transform:
        translateY(-30px)
        translateX(20px)
        scale(1.08);
    }

    100%{

        transform:
        translateY(20px)
        translateX(-20px)
        scale(1.02);
    }
}

/* =========================================
CONTAINER
========================================= */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    border-radius:30px;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        rgba(255,255,255,.015)
    );

    backdrop-filter:blur(35px);

    -webkit-backdrop-filter:blur(35px);

    border:1px solid rgba(255,255,255,.10);

    overflow:hidden;

    animation:
    pageEnter 1.2s ease,
    floatingPanel 8s ease-in-out infinite;

    box-shadow:

    0 0 40px rgba(255,255,255,.04),

    0 0 120px rgba(56,189,248,.08),

    0 0 220px rgba(56,189,248,.04),

    inset 0 0 30px rgba(255,255,255,.02);
}

/* LIQUID GLASS */

.container::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:30px;

    background:

    linear-gradient(
        140deg,
        rgba(255,255,255,.18),
        transparent 25%,
        rgba(255,255,255,.03),
        transparent 60%
    );

    pointer-events:none;

    animation:
    glassShift 10s linear infinite;
}

.container::after{

    content:"";

    position:absolute;

    inset:-2px;

    border-radius:30px;

    padding:1px;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,.14),
        transparent,
        rgba(255,255,255,.04)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;

    pointer-events:none;
}

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        translateY(40px)
        scale(.96);
    }

    to{

        opacity:1;

        transform:
        translateY(0)
        scale(1);
    }
}

@keyframes floatingPanel{

    0%{

        transform:
        translateY(0px)
        rotateX(0deg)
        rotateY(0deg);
    }

    25%{

        transform:
        translateY(-6px)
        rotateX(1deg)
        rotateY(-1deg);
    }

    50%{

        transform:
        translateY(-12px)
        rotateX(-1deg)
        rotateY(1deg);
    }

    75%{

        transform:
        translateY(-6px)
        rotateX(1deg)
        rotateY(1deg);
    }

    100%{

        transform:
        translateY(0px)
        rotateX(0deg)
        rotateY(0deg);
    }
}

@keyframes glassShift{

    0%{
        transform:translateX(-20px);
    }

    50%{
        transform:translateX(20px);
    }

    100%{
        transform:translateX(-20px);
    }
}

/* =========================================
HEADER
========================================= */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

/* =========================================
DROPZONE
========================================= */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(255,255,255,.15);

    padding:40px;

    border-radius:20px;

    cursor:pointer;

    transition:.35s;

    background:rgba(255,255,255,.02);
}

.dropzone:hover{

    border-color:rgba(255,255,255,.3);

    background:rgba(255,255,255,.05);

    transform:translateY(-2px);
}

/* =========================================
PLAYER
========================================= */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:20px;

    background:rgba(255,255,255,.04);

    backdrop-filter:blur(25px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,.08);

    position:relative;

    overflow:hidden;
}

/* =========================================
BUTTONS
========================================= */

#playBtn{

    background:
    rgba(255,255,255,.10);

    border:none;

    color:white;

    font-size:18px;

    border-radius:50%;

    width:42px;

    height:42px;

    cursor:pointer;

    transition:.3s;
}

#playBtn:hover{

    transform:scale(1.1);

    background:rgba(255,255,255,.18);
}

#stopBtn{

    background:rgba(255,255,255,.08);

    border:none;

    color:white;

    border-radius:50%;

    width:35px;

    height:35px;

    cursor:pointer;
}

/* =========================================
VISUALIZER
========================================= */

canvas{

    width:140px;

    height:42px;

    border-radius:12px;

    display:block;

    background:#050505;
}

/* =========================================
PROGRESS
========================================= */

.progress-audio{

    flex:1;

    height:6px;

    background:rgba(255,255,255,0.08);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;
}

.progress-fill{

    height:100%;

    width:0;

    background:
    rgba(255,255,255,.7);
}

#waveCanvas{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    opacity:.35;

    pointer-events:none;
}

/* =========================================
VOLUME
========================================= */

.volume-box{

    display:flex;

    align-items:center;

    gap:8px;
}

#volumeSlider{

    width:90px;
}

/* =========================================
CARDS
========================================= */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:rgba(255,255,255,.04);

    padding:20px;

    margin:10px;

    border-radius:18px;

    border:1px solid rgba(255,255,255,.06);

    backdrop-filter:blur(20px);

    transition:.35s;
}

.card:hover{

    transform:
    translateY(-4px)
    scale(1.03);

    background:rgba(255,255,255,.06);
}

/* =========================================
LOADER
========================================= */

.loader{

    margin-top:30px;

    display:none;
}

.bar{

    width:6px;

    height:40px;

    background:white;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* =========================================
TG BUTTON
========================================= */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:15px;

    background:
    rgba(255,255,255,.06);

    color:white;

    text-decoration:none;

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(20px);

    transition:.35s;
}

.tg-btn:hover{

    transform:translateY(-3px);

    background:rgba(255,255,255,.1);
}

/* =========================================
FOOTER
========================================= */

footer{

    margin-top:30px;

    margin-bottom:20px;

    color:rgba(255,255,255,.45);

    font-size:14px;
}

/* =========================================
COSMIC VIGNETTE
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    z-index:-1;

    background:
    radial-gradient(
        circle,
        transparent 40%,
        rgba(0,0,0,.65) 100%
    );
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="space-glow glow1"></div>
<div class="space-glow glow2"></div>
<div class="space-glow glow3"></div>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">

            <canvas id="waveCanvas"></canvas>

            <div class="progress-fill" id="progressFill"></div>

        </div>

        <span id="time">0:00</span>

        <div class="volume-box">

            <i class="ri-volume-up-line"></i>

            <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            >

        </div>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <div class="loader" id="loader">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <div class="cards" id="result"></div>

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* =========================================
ELEMENTS
========================================= */

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fileInput");

const audio =
document.getElementById("audio");

const player =
document.getElementById("player");

const playBtn =
document.getElementById("playBtn");

const stopBtn =
document.getElementById("stopBtn");

const progressFill =
document.getElementById("progressFill");

const progressAudio =
document.getElementById("progressAudio");

const time =
document.getElementById("time");

const canvas =
document.getElementById("visualizer");

const ctx =
canvas.getContext("2d");

const loader =
document.getElementById("loader");

const volumeSlider =
document.getElementById("volumeSlider");

const waveCanvas =
document.getElementById("waveCanvas");

const wctx =
waveCanvas.getContext("2d");

/* =========================================
AUDIO
========================================= */

let reactiveData = null;

/* =========================================
FILE
========================================= */

dropzone.onclick = () =>
fileInput.click();

fileInput.onchange = () =>
handle(fileInput.files[0]);

function handle(file){

    const url =
    URL.createObjectURL(file);

    audio.src = url;

    audio.load();

    player.style.display = "flex";

    visualize();

    upload(file);
}

/* =========================================
PLAY
========================================= */

playBtn.onclick = () => {

    if(!audio.src) return;

    if(audio.paused){

        audio.play();

        playBtn.innerHTML =
        '<i class="ri-pause-fill"></i>';

    }else{

        audio.pause();

        playBtn.innerHTML =
        '<i class="ri-play-fill"></i>';
    }
};

/* =========================================
STOP
========================================= */

stopBtn.onclick = () => {

    audio.pause();

    audio.currentTime = 0;

    audio.src = "";

    player.style.display = "none";
};

/* =========================================
VOLUME
========================================= */

volumeSlider.oninput = () => {

    audio.volume =
    volumeSlider.value;
};

/* =========================================
PROGRESS
========================================= */

audio.ontimeupdate = () => {

    const percent =
    (audio.currentTime / audio.duration)
    * 100;

    progressFill.style.width =
    percent + "%";

    let min =
    Math.floor(audio.currentTime / 60);

    let sec =
    Math.floor(audio.currentTime % 60);

    if(sec < 10)
        sec = "0" + sec;

    time.innerText =
    `${min}:${sec}`;
};

progressAudio.onclick = e => {

    const width =
    progressAudio.clientWidth;

    audio.currentTime =

    (e.offsetX / width)
    * audio.duration;
};

/* =========================================
UPLOAD
========================================= */

function upload(file){

    loader.style.display = "block";

    const formData =
    new FormData();

    formData.append("file", file);

    fetch("/analyze", {

        method:"POST",

        body:formData
    })

    .then(res => res.json())

    .then(data => {

        loader.style.display =
        "none";

        document.getElementById(
        "result"
        ).innerHTML = `

        <div class="card">
            BPM: ${data.bpm}
        </div>

        <div class="card">
            Key: ${data.key}
        </div>

        <div class="card">
            Energy: ${data.energy}
        </div>
        `;
    });
}

/* =========================================
VISUALIZER
========================================= */

function visualize(){

    const audioCtx =
    new AudioContext();

    const src =
    audioCtx
    .createMediaElementSource(audio);

    const analyser =
    audioCtx.createAnalyser();

    src.connect(analyser);

    analyser.connect(
    audioCtx.destination
    );

    analyser.fftSize = 256;

    reactiveData =
    new Uint8Array(
        analyser.frequencyBinCount
    );

    canvas.width = 140;
    canvas.height = 42;

    function draw(){

        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(
        reactiveData
        );

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const barWidth =
        canvas.width /
        reactiveData.length;

        for(
            let i=0;
            i<reactiveData.length;
            i++
        ){

            const value =
            reactiveData[i];

            const height =
            (value / 255)
            * canvas.height;

            ctx.fillStyle =
            "white";

            ctx.shadowBlur = 12;

            ctx.shadowColor =
            "white";

            ctx.fillRect(

                i * barWidth,

                canvas.height - height,

                barWidth - 1,

                height
            );
        }

        drawWaveform();
    }

    draw();
}

/* =========================================
WAVEFORM
========================================= */

function drawWaveform(){

    waveCanvas.width =
    waveCanvas.offsetWidth;

    waveCanvas.height =
    waveCanvas.offsetHeight;

    wctx.clearRect(
        0,
        0,
        waveCanvas.width,
        waveCanvas.height
    );

    if(!reactiveData) return;

    wctx.beginPath();

    for(
        let i=0;
        i<reactiveData.length;
        i++
    ){

        const x =
        (i / reactiveData.length)
        * waveCanvas.width;

        const y =
        waveCanvas.height / 2 +

        (
            reactiveData[i] / 255
        ) * 10 - 5;

        if(i === 0){

            wctx.moveTo(x,y);

        }else{

            wctx.lineTo(x,y);
        }
    }

    wctx.strokeStyle =
    "rgba(255,255,255,.8)";

    wctx.lineWidth = 1;

    wctx.stroke();
}

/* =========================================
SPACE BACKGROUND
========================================= */

const bgCanvas =
document.getElementById("bgCanvas");

const bgCtx =
bgCanvas.getContext("2d");

function resizeBG(){

    bgCanvas.width =
    innerWidth;

    bgCanvas.height =
    innerHeight;
}

resizeBG();

window.addEventListener(
    "resize",
    resizeBG
);

const particles = [];

for(let i=0;i<500;i++){

    particles.push({

        x:Math.random()*innerWidth,

        y:Math.random()*innerHeight,

        r:Math.random()*2.2,

        speed:Math.random()*0.15 + 0.02,

        alpha:Math.random(),

        twinkle:Math.random()*0.02
    });
}

function animateBG(){

    requestAnimationFrame(
        animateBG
    );

    bgCtx.fillStyle =
    "#000";

    bgCtx.fillRect(
        0,
        0,
        innerWidth,
        innerHeight
    );

    particles.forEach(p => {

        p.alpha += p.twinkle;

        if(p.alpha >= 1 || p.alpha <= 0.2){

            p.twinkle *= -1;
        }

        bgCtx.beginPath();

        bgCtx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        `rgba(255,255,255,${p.alpha})`;

        bgCtx.shadowBlur =
        15;

        bgCtx.shadowColor =
        "white";

        bgCtx.fill();

        bgCtx.shadowBlur = 0;

        p.y += p.speed;

        if(p.y > innerHeight){

            p.y = 0;

            p.x =
            Math.random()*innerWidth;
        }
    });

    /* SPACE DUST */

    for(let i=0;i<25;i++){

        bgCtx.beginPath();

        bgCtx.arc(

            Math.random()*innerWidth,
            Math.random()*innerHeight,

            Math.random()*1.5,

            0,
            Math.PI*2
        );

        bgCtx.fillStyle =
        "rgba(255,255,255,.03)";

        bgCtx.fill();
    }
}

animateBG();

</script>

</body>
</html>
