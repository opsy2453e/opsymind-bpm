<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OpsyMind BPM</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 30%, #0ea5e9, transparent),
                #020617;
}

/* контейнер */
.container {
    position: relative;
    margin: 80px auto;
    padding: 40px;
    max-width: 720px;
    background: rgba(255,255,255,0.06);
    border-radius: 25px;
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
}

/* hover glow */
button, .tg-btn, .dropzone {
    transition: 0.3s ease;
}

button:hover, .tg-btn:hover, .dropzone:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #38bdf8;
}

/* header */
.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

/* dropzone */
.dropzone {
    margin-top: 30px;
    border: 2px dashed rgba(56,189,248,0.6);
    padding: 40px;
    border-radius: 15px;
    cursor: pointer;
}

/* PLAYER */
.glass-player {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    display: none;
    flex-direction: column;
    gap: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
}

/* 🌌 STAR BACKGROUND */
.star-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: black;
}

canvas#stars {
    position: absolute;
    inset: 0;
    z-index: 0;
}

/* controls layer */
.player-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* buttons glow */
#playBtn, #stopBtn {
    transition: 0.3s;
}

#playBtn:hover, #stopBtn:hover {
    box-shadow: 0 0 15px #38bdf8;
    transform: scale(1.1);
}

/* progress */
.progress-audio {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
}

/* volume */
.volume {
    width: 80px;
}

/* canvas visualizer inside player */
canvas#visualizer {
    width: 100%;
    height: 70px;
    border-radius: 10px;
    z-index: 2;
    position: relative;
}

/* cards */
.cards {
    margin-top: 30px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
}

/* loader */
.loader {
    margin-top: 30px;
    display: none;
}

.bar {
    width: 6px;
    height: 40px;
    background: #38bdf8;
    margin: 0 3px;
    display: inline-block;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    0%,100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
}

/* button */
.tg-btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 12px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    text-decoration: none;
}

/* footer */
footer {
    margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="/static/avatar.png" class="logo">
    <h1><i class="ri-headphone-fill"></i> OpsyMind BPM</h1>
</div>

<div class="dropzone" id="dropzone">📤 Перетащи MP3 или нажми</div>
<input type="file" id="fileInput" hidden>

<!-- PLAYER -->
<div class="glass-player" id="player">

    <div class="star-bg">
        <canvas id="stars"></canvas>
    </div>

    <div class="player-content">
        <button id="playBtn"><i class="ri-play-fill"></i></button>

        <div class="progress-audio" id="progressAudio">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <input type="range" class="volume" id="volume" min="0" max="1" step="0.01">

        <span id="time">0:00</span>

        <button id="stopBtn"><i class="ri-close-line"></i></button>
    </div>

    <canvas id="visualizer"></canvas>
    <audio id="audio"></audio>
</div>

<div class="loader" id="loader">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="cards" id="result"></div>

</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");

const audio = document.getElementById("audio");
const player = document.getElementById("player");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");

const volume = document.getElementById("volume");

const progressFill = document.getElementById("progressFill");
const progressAudio = document.getElementById("progressAudio");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

dropzone.onclick = () => fileInput.click();
fileInput.onchange = () => handle(fileInput.files[0]);

volume.oninput = () => audio.volume = volume.value;

function handle(file){
    const url = URL.createObjectURL(file);
    audio.src = url;
    player.style.display = "flex";
    visualize();
    upload(file);
}

/* play */
playBtn.onclick = () => {
    audio.paused ? audio.play() : audio.pause();
};

/* stop */
stopBtn.onclick = () => {
    audio.pause();
    audio.currentTime = 0;
    player.style.display = "none";
};

/* progress */
audio.ontimeupdate = () => {
    let p = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = p + "%";
};

/* upload */
function upload(file){
    const fd = new FormData();
    fd.append("file", file);

    fetch("/analyze", {method:"POST", body:fd})
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("result").innerHTML =
        `<div class="card">BPM: ${d.bpm}</div>
         <div class="card">Key: ${d.key}</div>
         <div class="card">Energy: ${d.energy}</div>`;
    });
}

/* visualizer */
function visualize(){
    const ctxA = new AudioContext();
    const src = ctxA.createMediaElementSource(audio);
    const analyser = ctxA.createAnalyser();

    src.connect(analyser);
    analyser.connect(ctxA.destination);

    analyser.fftSize = 64;
    const data = new Uint8Array(analyser.frequencyBinCount);

    canvas.width = 700;
    canvas.height = 70;

    function draw(){
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(data);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let w = canvas.width / data.length;

        for(let i=0;i<data.length;i++){
            let h = data[i]/2;
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(i*w, canvas.height-h, w-2, h);
        }
    }
    draw();
}

/* STAR BACKGROUND */
const stars = document.getElementById("stars");
const sctx = stars.getContext("2d");

stars.width = 700;
stars.height = 140;

let starArr = Array.from({length:80},()=>({
    x:Math.random()*700,
    y:Math.random()*140,
    r:Math.random()*1.5
}));

function starAnim(){
    requestAnimationFrame(starAnim);
    sctx.fillStyle="black";
    sctx.fillRect(0,0,700,140);

    sctx.fillStyle="white";
    starArr.forEach(s=>{
        sctx.beginPath();
        sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        sctx.fill();
    });
}
starAnim();
</script>

</body>
</html>
