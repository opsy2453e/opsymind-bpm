<style>

/* =========================================
HOLOGRAPHIC GLASS
========================================= */

.container::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:25px;

    background:

    linear-gradient(
        135deg,
        rgba(255,255,255,0.06),
        transparent 20%,
        rgba(56,189,248,0.04) 40%,
        transparent 60%,
        rgba(255,255,255,0.05)
    );

    mix-blend-mode:screen;

    pointer-events:none;

    animation:
    holoShift 12s linear infinite;
}

@keyframes holoShift{

    0%{
        transform:
        translateX(-5%)
        translateY(0%)
        rotate(0deg);
    }

    50%{
        transform:
        translateX(5%)
        translateY(-2%)
        rotate(1deg);
    }

    100%{
        transform:
        translateX(-5%)
        translateY(0%)
        rotate(0deg);
    }
}

/* =========================================
LIQUID UI
========================================= */

.liquid-blob{

    position:fixed;

    width:500px;

    height:500px;

    border-radius:50%;

    filter:blur(90px);

    opacity:.18;

    pointer-events:none;

    z-index:-4;

    animation:
    liquidMove 18s ease-in-out infinite alternate;
}

.blob1{

    background:#38bdf8;

    top:-100px;

    left:-100px;
}

.blob2{

    background:#0ea5e9;

    bottom:-150px;

    right:-100px;

    animation-delay:-8s;
}

@keyframes liquidMove{

    0%{

        transform:
        scale(1)
        translate(0,0);
    }

    50%{

        transform:
        scale(1.25)
        translate(60px,-30px);
    }

    100%{

        transform:
        scale(.95)
        translate(-40px,40px);
    }
}

/* =========================================
3D FLOATING CARDS
========================================= */

.card{

    position:relative;

    overflow:hidden;

    backdrop-filter:blur(18px);

    transform-style:preserve-3d;

    transition:
    transform .4s ease,
    box-shadow .4s ease;
}

.card::before{

    content:"";

    position:absolute;

    inset:-30%;

    background:

    radial-gradient(
        circle,
        rgba(255,255,255,.12),
        transparent 60%
    );

    opacity:0;

    transition:.4s;
}

.card:hover::before{

    opacity:1;
}

.card:hover{

    transform:

    perspective(900px)
    rotateX(10deg)
    rotateY(-10deg)
    translateY(-8px)
    scale(1.04);

    box-shadow:

    0 25px 60px rgba(56,189,248,.25),

    0 0 80px rgba(14,165,233,.18);
}

/* =========================================
WAVEFORM TIMELINE
========================================= */

#waveform{

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:100%;

    opacity:.45;

    pointer-events:none;
}

/* =========================================
BPM RINGS
========================================= */

.bpm-ring{

    position:fixed;

    left:50%;

    top:50%;

    width:120px;

    height:120px;

    border-radius:50%;

    border:1px solid rgba(56,189,248,.25);

    transform:
    translate(-50%,-50%)
    scale(.4);

    pointer-events:none;

    z-index:-1;

    opacity:0;
}

/* =========================================
REACTIVE STARS
========================================= */

.reactive-star{

    position:fixed;

    width:2px;

    height:2px;

    border-radius:50%;

    background:white;

    pointer-events:none;

    z-index:-2;

    box-shadow:

    0 0 12px white,
    0 0 30px #38bdf8;
}

/* =========================================
SPACE FOG
========================================= */

#spaceFog{

    position:fixed;

    inset:-20%;

    z-index:-5;

    pointer-events:none;

    opacity:.25;

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(255,255,255,.06),
        transparent 40%
    ),

    radial-gradient(
        circle at 80% 60%,
        rgba(56,189,248,.10),
        transparent 40%
    ),

    radial-gradient(
        circle at center,
        rgba(14,165,233,.08),
        transparent 50%
    );

    filter:blur(100px);

    animation:
    fogMove 25s ease-in-out infinite alternate;
}

@keyframes fogMove{

    0%{

        transform:
        translateX(0)
        translateY(0)
        scale(1);
    }

    100%{

        transform:
        translateX(-60px)
        translateY(40px)
        scale(1.15);
    }
}

</style>

<script>

/* =========================================
DEEP SPACE LAYERS
========================================= */

const fog =
document.createElement("div");

fog.id = "spaceFog";

document.body.appendChild(fog);

const blob1 =
document.createElement("div");

blob1.className =
"liquid-blob blob1";

document.body.appendChild(blob1);

const blob2 =
document.createElement("div");

blob2.className =
"liquid-blob blob2";

document.body.appendChild(blob2);

/* =========================================
WAVEFORM TIMELINE
========================================= */

const waveform =
document.createElement("canvas");

waveform.id = "waveform";

document.querySelector(
".progress-audio"
).appendChild(waveform);

const wctx =
waveform.getContext("2d");

function resizeWave(){

    waveform.width =
    waveform.offsetWidth;

    waveform.height =
    waveform.offsetHeight;
}

resizeWave();

window.addEventListener(
    "resize",
    resizeWave
);

/* =========================================
CAMERA MOTION SYSTEM
========================================= */

let mouseX = 0;
let mouseY = 0;

let currentX = 0;
let currentY = 0;

document.addEventListener(
    "mousemove",
    e => {

        mouseX =
        (e.clientX / innerWidth - .5);

        mouseY =
        (e.clientY / innerHeight - .5);
    }
);

function cinematicCamera(){

    currentX +=
    (mouseX - currentX) * .05;

    currentY +=
    (mouseY - currentY) * .05;

    const container =
    document.querySelector(".container");

    container.style.transform = `

        perspective(1400px)

        rotateY(${currentX * 8}deg)

        rotateX(${-currentY * 8}deg)

        translateY(${
            Math.sin(Date.now()*.0015)*4
        }px)

    `;

    requestAnimationFrame(
        cinematicCamera
    );
}

cinematicCamera();

/* =========================================
REACTIVE STARS
========================================= */

const reactiveStars = [];

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className =
    "reactive-star";

    star.style.left =
    Math.random()*100 + "vw";

    star.style.top =
    Math.random()*100 + "vh";

    star.style.opacity =
    Math.random();

    document.body.appendChild(star);

    reactiveStars.push(star);
}

/* =========================================
BPM RINGS
========================================= */

function spawnRing(){

    const ring =
    document.createElement("div");

    ring.className =
    "bpm-ring";

    document.body.appendChild(ring);

    ring.animate(

        [

            {
                opacity:.7,

                transform:
                "translate(-50%,-50%) scale(.4)"
            },

            {
                opacity:0,

                transform:
                "translate(-50%,-50%) scale(4)"
            }

        ],

        {
            duration:1800,
            easing:"ease-out"
        }
    );

    setTimeout(() => {

        ring.remove();

    },1800);
}

/* =========================================
AUDIO REACTIVE AURORA V2
========================================= */

function ultraReactiveEnvironment(){

    if(
        !reactiveAnalyser ||
        !reactiveData
    ){

        requestAnimationFrame(
            ultraReactiveEnvironment
        );

        return;
    }

    reactiveAnalyser
    .getByteFrequencyData(
        reactiveData
    );

    let bass = 0;
    let mids = 0;
    let highs = 0;

    for(let i=0;i<20;i++){

        bass += reactiveData[i];
    }

    for(let i=20;i<80;i++){

        mids += reactiveData[i];
    }

    for(let i=80;i<120;i++){

        highs += reactiveData[i];
    }

    bass /= 20;
    mids /= 60;
    highs /= 40;

    const bassPower =
    bass / 255;

    const highPower =
    highs / 255;

    /* =========================================
    AURORA V2
    ========================================= */

    aurora.style.filter = `

        blur(${70 + bassPower * 50}px)

        hue-rotate(${mids * .4}deg)

        brightness(${1 + bassPower * .6})

    `;

    aurora.style.transform = `

        scale(${1 + bassPower * .08})

        rotate(${mids * .03}deg)

    `;

    /* =========================================
    CONTAINER GLOW
    ========================================= */

    document.querySelector(
    ".container"
    ).style.boxShadow = `

        0 25px 90px rgba(
            56,189,248,
            ${0.15 + bassPower * .6}
        ),

        0 0 180px rgba(
            14,165,233,
            ${0.08 + bassPower * .5}
        ),

        inset 0 1px 0 rgba(
            255,255,255,.08
        )

    `;

    /* =========================================
    REACTIVE STARS
    ========================================= */

    reactiveStars.forEach(
    star => {

        const scale =
        1 + highPower * 2;

        star.style.transform = `

            scale(${scale})

        `;

        star.style.opacity =
        .3 + highPower;

        star.style.filter = `

            blur(${highPower * 2}px)

        `;
    });

    /* =========================================
    WAVEFORM
    ========================================= */

    wctx.clearRect(
        0,
        0,
        waveform.width,
        waveform.height
    );

    wctx.beginPath();

    for(
        let i=0;
        i<reactiveData.length;
        i++
    ){

        const x =
        (i / reactiveData.length)
        * waveform.width;

        const y =
        waveform.height/2 +

        (
            reactiveData[i] / 255
        ) * 10 - 5;

        if(i === 0){

            wctx.moveTo(x,y);

        }else{

            wctx.lineTo(x,y);
        }
    }

    wctx.strokeStyle =
    "rgba(125,211,252,.8)";

    wctx.lineWidth = 1.5;

    wctx.shadowBlur = 12;

    wctx.shadowColor =
    "#38bdf8";

    wctx.stroke();

    wctx.shadowBlur = 0;

    /* =========================================
    BPM RINGS
    ========================================= */

    if(bass > 180){

        spawnRing();
    }

    /* =========================================
    SPACE FOG
    ========================================= */

    fog.style.opacity =
    .2 + bassPower * .4;

    fog.style.transform = `

        scale(${1 + bassPower * .1})

        rotate(${mids * .02}deg)

    `;

    requestAnimationFrame(
        ultraReactiveEnvironment
    );
}

ultraReactiveEnvironment();

/* =========================================
METEORS
========================================= */

function spawnMeteor(){

    const meteor =
    document.createElement("div");

    meteor.style.position =
    "fixed";

    meteor.style.width =
    "160px";

    meteor.style.height =
    "2px";

    meteor.style.background = `

        linear-gradient(
            90deg,
            white,
            transparent
        )

    `;

    meteor.style.left =
    Math.random()*100 + "vw";

    meteor.style.top =
    Math.random()*60 + "vh";

    meteor.style.transform =
    "rotate(-25deg)";

    meteor.style.opacity = ".8";

    meteor.style.pointerEvents =
    "none";

    meteor.style.zIndex = "-2";

    meteor.style.boxShadow = `

        0 0 20px white,
        0 0 40px #38bdf8

    `;

    document.body.appendChild(
        meteor
    );

    meteor.animate(

        [

            {
                transform:
                "translateX(0) translateY(0) rotate(-25deg)",

                opacity:1
            },

            {
                transform:
                "translateX(-600px) translateY(300px) rotate(-25deg)",

                opacity:0
            }

        ],

        {
            duration:2000,
            easing:"ease-out"
        }
    );

    setTimeout(() => {

        meteor.remove();

    },2000);
}

setInterval(
    spawnMeteor,
    4000
);

</script>
