<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>OpsyMind BPM</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top,#0f172a 0%,#111827 35%,#1e293b 100%);
}

/* cyber background */

#bgCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-2;

    background:
    linear-gradient(
        180deg,
        #0f172a,
        #111827,
        #1e293b
    );
}

/* container */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:720px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.4);

    overflow:hidden;

    animation:float 8s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* shine */

.container::before{

    content:"";

    position:absolute;

    inset:-50%;

    background:
    linear-gradient(
        110deg,
        transparent 40%,
        rgba(255,255,255,0.1),
        transparent 60%
    );

    transform:translateX(-120%) rotate(15deg);

    transition:0.8s;

    pointer-events:none;
}

.container:hover::before{

    transform:translateX(120%) rotate(15deg);
}

/* header */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

/* dropzone */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(125,211,252,0.5);

    padding:40px;

    border-radius:15px;

    cursor:pointer;

    transition:all .35s ease;
}

.dropzone:hover{

    border-color:#7dd3fc;

    background:rgba(125,211,252,0.06);

    box-shadow:
    inset 0 0 25px rgba(125,211,252,.15);
}

/* player */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    overflow:hidden;

    transition:0.4s ease;
}

.glass-player:hover{

    transform:translateY(-2px) scale(1.01);

    box-shadow:
    0 10px 40px rgba(125,211,252,0.22);
}

/* ambient */

.ambient-wave{

    position:absolute;

    inset:-40%;

    background:

    radial-gradient(
        circle at 20% 20%,
        rgba(125,211,252,.18),
        transparent 30%
    ),

    radial-gradient(
        circle at 80% 30%,
        rgba(56,189,248,.16),
        transparent 35%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(186,230,253,.12),
        transparent 40%
    );

    filter:blur(45px);

    animation:
    waveMove 12s ease-in-out infinite alternate;

    pointer-events:none;
}

@keyframes waveMove{

    0%{
        transform:
        rotate(0deg)
        scale(1)
        translateY(0px);
    }

    50%{
        transform:
        rotate(8deg)
        scale(1.1)
        translateY(-10px);
    }

    100%{
        transform:
        rotate(-8deg)
        scale(1.05)
        translateY(8px);
    }
}

/* player shine */

.glass-player::after{

    content:'';

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.06),
        transparent
    );

    transform:translateX(-100%);

    animation:shine 6s linear infinite;
}

@keyframes shine{

    100%{
        transform:translateX(100%);
    }
}

/* buttons */

#playBtn{

    background:
    linear-gradient(
        135deg,
        #7dd3fc,
        #38bdf8
    );

    border:none;

    color:white;

    font-size:18px;

    border-radius:50%;

    width:42px;

    height:42px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#playBtn:hover{

    transform:scale(1.12);

    box-shadow:
    0 0 25px rgba(125,211,252,.7);
}

#stopBtn{

    background:rgba(255,255,255,0.1);

    border:none;

    color:white;

    border-radius:50%;

    width:35px;

    height:35px;

    cursor:pointer;

    transition:.35s;

    z-index:2;
}

#stopBtn:hover{

    transform:scale(1.12) rotate(90deg);

    background:rgba(255,255,255,0.2);
}

/* FFT */

canvas{

    width:140px;

    height:42px;

    border-radius:12px;

    display:block;

    z-index:2;

    background:
    radial-gradient(circle at center,#111827,#020617);

    box-shadow:
    inset 0 0 25px rgba(0,0,0,.7),
    0 0 20px rgba(125,211,252,.08);

    position:relative;

    overflow:hidden;
}

/* progress */

.progress-audio{

    flex:1;

    height:6px;

    background:rgba(255,255,255,0.1);

    border-radius:10px;

    overflow:hidden;

    cursor:pointer;

    position:relative;

    z-index:2;
}

.progress-fill{

    height:100%;

    width:0%;

    background:
    linear-gradient(
        90deg,
        #7dd3fc,
        #38bdf8
    );
}

/* time */

#time{

    font-size:12px;

    z-index:2;
}

/* volume */

.volume-box{

    display:flex;

    align-items:center;

    gap:8px;

    z-index:2;
}

.volume-box i{

    color:#bae6fd;

    font-size:18px;
}

#volumeSlider{

    appearance:none;

    width:90px;

    height:4px;

    border-radius:20px;

    background:rgba(255,255,255,0.15);

    outline:none;

    overflow:hidden;

    cursor:pointer;
}

#volumeSlider::-webkit-slider-thumb{

    appearance:none;

    width:14px;

    height:14px;

    border-radius:50%;

    background:#7dd3fc;

    box-shadow:-100px 0 0 95px #7dd3fc;

    cursor:pointer;

    transition:.25s;
}

/* cards */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:space-around;

    flex-wrap:wrap;
}

.card{

    background:rgba(255,255,255,0.05);

    padding:20px;

    margin:10px;

    border-radius:15px;

    transition:.35s;
}

.card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 10px 30px rgba(125,211,252,.16);
}

/* loader */

.loader{

    margin-top:30px;

    display:none;
}

.bar{

    width:6px;

    height:40px;

    background:#7dd3fc;

    margin:0 3px;

    display:inline-block;

    animation:bounce 1s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:scaleY(0.3);
    }

    50%{
        transform:scaleY(1);
    }
}

/* tg */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #7dd3fc,
        #38bdf8
    );

    color:white;

    text-decoration:none;

    transition:.35s;
}

.tg-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(125,211,252,.35);
}

footer{
    margin-top:40px;
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <div class="ambient-wave"></div>

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <span id="time">0:00</span>

        <div class="volume-box">

            <i class="ri-volume-up-line"></i>

            <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
            >

        </div>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <div class="loader" id="loader">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <div class="cards" id="result"></div>

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* сюда вставь весь свой JS без изменений */

</script>

</body>
</html>
