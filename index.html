<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OpsyMind BPM Ultra Premium</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet"
/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Space Grotesk',sans-serif;

    color:#f8fafc;

    text-align:center;

    overflow-x:hidden;

    background:
    radial-gradient(circle at top,#071426,#020617 55%,#000814);

    transform-origin:center;

    letter-spacing:.3px;

    animation:bodyFade 1.2s ease;
}

@keyframes bodyFade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

/* NOISE */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    url("https://grainy-gradients.vercel.app/noise.svg");

    opacity:.035;

    mix-blend-mode:soft-light;

    pointer-events:none;

    z-index:999;
}

/* CURSOR GLOW */

#cursorGlow{

    position:fixed;

    width:450px;

    height:450px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(56,189,248,.16),
        transparent 70%
    );

    pointer-events:none;

    z-index:-1;

    transform:translate(-50%,-50%);

    transition:
    transform .12s linear,
    opacity .3s ease;

    filter:blur(20px);
}

/* FLOATING ORBS */

.orb{

    position:fixed;

    border-radius:50%;

    pointer-events:none;

    filter:blur(60px);

    z-index:-2;

    opacity:.22;

    animation:
    orbFloat 12s ease-in-out infinite;
}

.orb1{

    width:300px;
    height:300px;

    background:#38bdf8;

    top:10%;
    left:5%;
}

.orb2{

    width:250px;
    height:250px;

    background:#0ea5e9;

    bottom:10%;
    right:10%;
}

@keyframes orbFloat{

    0%{
        transform:
        translateY(0px)
        scale(1);
    }

    50%{
        transform:
        translateY(-30px)
        scale(1.1);
    }

    100%{
        transform:
        translateY(0px)
        scale(1);
    }
}

/* cyber background */

#bgCanvas{

    position:fixed;

    inset:0;

    width:100%;

    height:100%;

    z-index:-2;

    background:#020617;
}

/* aurora */

#aurora{

    position:fixed;

    inset:0;

    z-index:-3;

    pointer-events:none;

    background:

    radial-gradient(
        circle at 20% 30%,
        rgba(56,189,248,.18),
        transparent 35%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(14,165,233,.14),
        transparent 40%
    ),

    radial-gradient(
        circle at 50% 80%,
        rgba(125,211,252,.12),
        transparent 45%
    ),

    radial-gradient(
        circle at center,
        rgba(255,255,255,.03),
        transparent 70%
    );

    filter:blur(70px);

    animation:
    auroraMove 18s ease-in-out infinite alternate;
}

@keyframes auroraMove{

    0%{

        transform:
        scale(1)
        rotate(0deg)
        translateY(0px);
    }

    50%{

        transform:
        scale(1.08)
        rotate(6deg)
        translateY(-15px);
    }

    100%{

        transform:
        scale(1.03)
        rotate(-6deg)
        translateY(10px);
    }
}

/* reflection */

#reflection{

    position:fixed;

    inset:0;

    z-index:-1;

    pointer-events:none;

    background:

    linear-gradient(
        120deg,
        rgba(255,255,255,0.03),
        transparent 30%,
        rgba(125,211,252,0.04),
        transparent 70%
    );

    mix-blend-mode:screen;
}

/* container */

.container{

    position:relative;

    margin:80px auto;

    padding:40px;

    max-width:760px;

    background:rgba(255,255,255,0.08);

    border-radius:25px;

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.16);

    box-shadow:

    0 25px 80px rgba(56,189,248,.15),

    0 0 120px rgba(14,165,233,.08),

    inset 0 1px 0 rgba(255,255,255,.08);

    overflow:hidden;

    animation:
    float 8s ease-in-out infinite,
    pageEnter 1.8s cubic-bezier(.16,1,.3,1);

    transform-style:preserve-3d;

    perspective:1200px;

    filter:
    drop-shadow(
        0 0 40px rgba(56,189,248,.15)
    );
}

.container::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:25px;

    padding:1px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(56,189,248,.25),
        transparent,
        rgba(125,211,252,.18)
    );

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;

    animation:
    borderFlow 6s linear infinite;
}

@keyframes borderFlow{

    0%{
        filter:hue-rotate(0deg);
    }

    100%{
        filter:hue-rotate(360deg);
    }
}

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        scale(1.03)
        translateY(20px);
    }

    to{

        opacity:1;

        transform:
        scale(1)
        translateY(0);
    }
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* HEADER */

.header{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;
}

.logo{

    width:70px;

    height:70px;

    border-radius:50%;
}

h1{

    font-size:42px;

    font-weight:700;

    letter-spacing:1px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #7dd3fc,
        #38bdf8
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 25px rgba(56,189,248,.35);

    margin:0;
}

.hero-sub{

    margin-top:10px;

    color:rgba(255,255,255,.65);

    font-size:14px;

    letter-spacing:2px;

    text-transform:uppercase;
}

/* DROPZONE */

.dropzone{

    margin-top:30px;

    border:2px dashed rgba(56,189,248,0.7);

    padding:40px;

    border-radius:15px;

    cursor:pointer;

    transition:all .35s ease;

    position:relative;

    overflow:hidden;
}

.dropzone.dragover{

    transform:scale(1.03);

    border-color:#7dd3fc;

    background:
    rgba(56,189,248,.12);

    box-shadow:
    0 0 60px rgba(56,189,248,.2);
}

/* PLAYER */

.glass-player{

    margin-top:20px;

    padding:15px;

    border-radius:18px;

    background:rgba(255,255,255,0.10);

    backdrop-filter:blur(20px);

    display:none;

    align-items:center;

    gap:12px;

    border:1px solid rgba(255,255,255,0.12);

    position:relative;

    overflow:hidden;

    transition:0.4s ease;

    opacity:0;

    transform:
    translateY(30px)
    scale(.95);
}

.glass-player.active{

    opacity:1;

    transform:
    translateY(0)
    scale(1);
}

.glass-player.playing{

    box-shadow:
    0 0 60px rgba(56,189,248,.35),
    0 0 120px rgba(14,165,233,.15);
}

/* BUTTONS */

#playBtn,
#stopBtn{

    border:none;

    color:white;

    border-radius:50%;

    cursor:pointer;
}

#playBtn{

    width:42px;
    height:42px;

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );
}

#stopBtn{

    width:35px;
    height:35px;

    background:rgba(255,255,255,.1);
}

/* CARDS */

.cards{

    margin-top:30px;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:15px;
}

.card{

    background:rgba(255,255,255,0.07);

    padding:20px;

    border-radius:15px;

    min-width:180px;

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(25px);

    transition:.4s;
}

.card:hover{

    transform:
    translateY(-8px)
    scale(1.03);

    box-shadow:
    0 15px 40px rgba(56,189,248,.25);
}

/* LIVE STATS */

.live-stats{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:25px;

    flex-wrap:wrap;
}

.live-card{

    min-width:180px;

    padding:20px;

    border-radius:20px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(30px);

    transition:.5s;
}

.live-card span{

    font-size:28px;

    font-weight:700;
}

/* TG BUTTON */

.tg-btn{

    margin-top:30px;

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #0ea5e9
    );

    color:white;

    text-decoration:none;
}

footer{
    margin-top:40px;
}

</style>
</head>

<body>

<div id="cursorGlow"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div id="aurora"></div>
<div id="reflection"></div>

<canvas id="bgCanvas"></canvas>

<div class="container">

    <div class="header">

        <img
        src="/static/avatar.png"
        class="logo"
        >

        <h1>
            <i class="ri-headphone-fill"></i>
            OpsyMind BPM
        </h1>

    </div>

    <p class="hero-sub">
        Твой лучший помощник в музыке по имени Opsy!
    </p>

    <div class="dropzone" id="dropzone">
        📤 Перетащи MP3 или нажми
    </div>

    <input type="file" id="fileInput" hidden>

    <div class="glass-player" id="player">

        <button id="playBtn">
            <i class="ri-play-fill"></i>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="progress-audio" id="progressAudio">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <span id="time">0:00</span>

        <button id="stopBtn">
            <i class="ri-close-line"></i>
        </button>

        <audio id="audio"></audio>

    </div>

    <div class="cards" id="result"></div>

    <div class="live-stats">

        <div class="live-card">
            <span id="liveBpm">128</span>
            <p>Realtime BPM</p>
        </div>

        <div class="live-card">
            <span id="liveEnergy">87%</span>
            <p>Energy Pulse</p>
        </div>

        <div class="live-card">
            <span id="liveMood">Night Drive</span>
            <p>AI Mood</p>
        </div>

    </div>

    <a
    href="https://t.me/OpsyMindBot"
    target="_blank"
    class="tg-btn"
    >
        Открыть бота
    </a>

</div>

<footer>
🤖 @OpsyMindBot
</footer>

<script>

/* ELEMENTS */

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fileInput");

const audio =
document.getElementById("audio");

const player =
document.getElementById("player");

const playBtn =
document.getElementById("playBtn");

const stopBtn =
document.getElementById("stopBtn");

const glow =
document.getElementById("cursorGlow");

/* CURSOR */

document.addEventListener("mousemove", e => {

    glow.style.left =
    e.clientX + "px";

    glow.style.top =
    e.clientY + "px";
});

/* FILE */

dropzone.onclick = () =>
fileInput.click();

fileInput.onchange = () =>
handle(fileInput.files[0]);

function handle(file){

    const url =
    URL.createObjectURL(file);

    audio.src = url;

    player.style.display = "flex";

    setTimeout(() => {

        player.classList.add("active");

    },50);
}

/* PLAY */

playBtn.onclick = () => {

    if(audio.paused){

        audio.play();

        player.classList.add("playing");

    }else{

        audio.pause();

        player.classList.remove("playing");
    }
};

/* STOP */

stopBtn.onclick = () => {

    audio.pause();

    player.classList.remove("playing");
};

/* DRAG DROP */

dropzone.addEventListener("dragover", e => {

    e.preventDefault();

    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {

    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {

    e.preventDefault();

    dropzone.classList.remove("dragover");

    const file =
    e.dataTransfer.files[0];

    if(file){

        handle(file);
    }
});

/* LIVE STATS */

setInterval(() => {

    document.getElementById(
        "liveBpm"
    ).innerText =
    120 + Math.floor(Math.random()*15);

},3000);

/* PARALLAX */

document.addEventListener("mousemove", e => {

    const x =
    (e.clientX / window.innerWidth - 0.5);

    const y =
    (e.clientY / window.innerHeight - 0.5);

    document.querySelector(".container")
    .style.transform = `

        rotateY(${x * 6}deg)
        rotateX(${-y * 6}deg)

    `;
});

/* STAR BURSTS */

setInterval(() => {

    const burst =
    document.createElement("div");

    burst.style.position = "fixed";

    burst.style.left =
    Math.random()*100 + "vw";

    burst.style.top =
    Math.random()*100 + "vh";

    burst.style.width = "3px";

    burst.style.height = "3px";

    burst.style.borderRadius = "50%";

    burst.style.background = "white";

    burst.style.boxShadow =
    "0 0 20px white";

    document.body.appendChild(burst);

    setTimeout(() => {

        burst.remove();

    },1500);

},700);

</script>

</body>
</html>
