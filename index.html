<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OpsyMind BPM</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;

    background:
        radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
        radial-gradient(circle at 80% 30%, #0ea5e9, transparent),
        #020617;
}

/* контейнер */
.container {
    position: relative;
    margin: 80px auto;
    padding: 40px;
    max-width: 720px;

    background: rgba(255,255,255,0.06);
    border-radius: 25px;

    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.12);

    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;

    animation: float 8s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

/* блик */
.container::before {
    content: "";
    position: absolute;
    inset: -50%;
    background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.1), transparent 60%);
    transform: translateX(-120%) rotate(15deg);
    transition: 0.8s;
    pointer-events: none;
}

.container:hover::before {
    transform: translateX(120%) rotate(15deg);
}

/* header */
.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

/* dropzone */
.dropzone {
    margin-top: 30px;
    border: 2px dashed rgba(56,189,248,0.6);
    padding: 40px;
    border-radius: 15px;
    cursor: pointer;
}

/* 🎧 player */
.glass-player {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);

    display: none;
    align-items: center;
    gap: 10px;

    border: 1px solid rgba(255,255,255,0.1);
}

#playBtn {
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    cursor: pointer;
}

#stopBtn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    cursor: pointer;
}

.progress-audio {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
}

#time {
    font-size: 12px;
}

/* 🌊 визуализация */
canvas {
    display: none;
    margin-top: 10px;
    width: 100%;
    height: 70px;
    background: #020617;
    border-radius: 10px;
}

/* карточки */
.cards {
    margin-top: 30px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
}

/* loader */
.loader {
    margin-top: 30px;
    display: none;
}

.bar {
    width: 6px;
    height: 40px;
    background: #38bdf8;
    margin: 0 3px;
    display: inline-block;
    animation: bounce 1s infinite;
}

@keyframes bounce {
    0%,100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
}

/* кнопка */
.tg-btn {
    margin-top: 30px;
    display: inline-block;
    padding: 12px 25px;
    border-radius: 12px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    text-decoration: none;
}

/* footer */
footer {
    margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="/static/avatar.png" class="logo">
    <h1><i class="ri-headphone-fill"></i> OpsyMind BPM</h1>
</div>

<div class="dropzone" id="dropzone">
    📤 Перетащи MP3 или нажми
</div>

<input type="file" id="fileInput" hidden>

<!-- 🎧 player -->
<div class="glass-player" id="player">

    <button id="playBtn"><i class="ri-play-fill"></i></button>

    <div class="progress-audio" id="progressAudio">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <span id="time">0:00</span>

    <button id="stopBtn"><i class="ri-close-line"></i></button>

    <audio id="audio"></audio>

</div>

<canvas id="visualizer"></canvas>

<div class="loader" id="loader">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<div class="cards" id="result"></div>

<a href="https://t.me/OpsyMindBot" target="_blank" class="tg-btn">
    Открыть бота
</a>

</div>

<footer>🤖 @OpsyMindBot</footer>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");

const audio = document.getElementById("audio");
const player = document.getElementById("player");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");

const progressFill = document.getElementById("progressFill");
const progressAudio = document.getElementById("progressAudio");
const time = document.getElementById("time");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

const loader = document.getElementById("loader");

dropzone.onclick = () => fileInput.click();
fileInput.onchange = () => handle(fileInput.files[0]);

function handle(file){
    const url = URL.createObjectURL(file);

    audio.src = url;
    audio.load();

    player.style.display = "flex";
    canvas.style.display = "block";

    visualize();
    upload(file);
}

/* play */
playBtn.onclick = () => {
    if(!audio.src) return;

    if(audio.paused){
        audio.play();
        playBtn.innerHTML = '<i class="ri-pause-fill"></i>';
    } else {
        audio.pause();
        playBtn.innerHTML = '<i class="ri-play-fill"></i>';
    }
};

/* stop/reset */
stopBtn.onclick = () => {
    audio.pause();
    audio.currentTime = 0;
    audio.src = "";

    player.style.display = "none";
    canvas.style.display = "none";

    progressFill.style.width = "0%";
    time.innerText = "0:00";

    document.getElementById("result").innerHTML = "";
};

/* прогресс */
audio.ontimeupdate = () => {
    let percent = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = percent + "%";

    let min = Math.floor(audio.currentTime / 60);
    let sec = Math.floor(audio.currentTime % 60);
    if(sec < 10) sec = "0"+sec;

    time.innerText = `${min}:${sec}`;
};

/* перемотка */
progressAudio.onclick = e => {
    let width = progressAudio.clientWidth;
    let clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
};

/* загрузка */
function upload(file){
    loader.style.display = "block";
    document.getElementById("result").innerHTML = "";

    const formData = new FormData();
    formData.append("file", file);

    fetch("/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data=>{
        loader.style.display = "none";

        document.getElementById("result").innerHTML = `
            <div class="card">BPM: ${data.bpm}</div>
            <div class="card">Key: ${data.key}</div>
            <div class="card">Energy: ${data.energy}</div>
        `;
    });
}

/* визуализация */
function visualize(){
    const audioCtx = new AudioContext();
    const src = audioCtx.createMediaElementSource(audio);
    const analyser = audioCtx.createAnalyser();

    src.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 64;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    canvas.width = 700;
    canvas.height = 70;

    function draw(){
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let barWidth = canvas.width / dataArray.length;

        for(let i=0;i<dataArray.length;i++){
            let h = dataArray[i]/2;
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(i*barWidth, canvas.height-h, barWidth-2, h);
        }
    }
    draw();
}
</script>

</body>
</html>
